name: MTT Workspace CI
on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build_workspace:
    name: Build & Lint ROS 2 Workspace
    runs-on: ubuntu-24.04
    container:
      image: ros:jazzy-ros-base-noble
      
    steps:
      - name: System Setup
        run: |
          apt-get update
          apt-get install -y python3-vcstool git ssh-client lsb-release wget gnupg

      - name: Checkout MTT Workspace
        uses: actions/checkout@v4
        with:
          path: workspace

      - name: Import Dependencies via vcs
        run: |
          # The container isolation breaks webfactory/ssh-agent, so we inject the key directly
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo -e "Host github.com\n\tStrictHostKeyChecking no\n" > ~/.ssh/config
          eval $(ssh-agent -s)
          ssh-add ~/.ssh/id_ed25519
          # Explicitly bypass SSH Host Verification strictly for Git operations
          export GIT_SSH_COMMAND="ssh -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no"
          
          mkdir -p workspace/src/external
          vcs import workspace/src < workspace/dependencies/robot.repos

      - name: Install rosdep components
        run: |
          rosdep init || true
          rosdep update
          rosdep install --from-paths workspace/src --ignore-src -y --rosdistro jazzy

      - name: Colcon Build
        run: |
          . /opt/ros/jazzy/setup.sh
          cd workspace
          colcon build --symlink-install --event-handlers console_direct+

      - name: Colcon Test
        run: |
          . /opt/ros/jazzy/setup.sh
          cd workspace
          colcon test
          colcon test-result --all
