/**:
  foxglove_bridge:
    ros__parameters:
      port: 8765
      address: "0.0.0.0"
      tls: false
      certfile: ""
      keyfile: ""
      topic_whitelist:
        - ".*"
      param_whitelist:
        - ".*"
      service_whitelist:
        - ".*"
      # best_effort QoS uniquement sur les topics haute fréquence — évite
      # les drops silencieux sur les topics critiques (cmd_vel, status)
      best_effort_qos_topic_whitelist:
        - "/mtt_tachometer"
        - "/mtt_odometry"
        - "/scan"
        - "/points"
        - "/cloud"
        - "/imu"
      client_topic_whitelist:
        - ".*"
      min_qos_depth: 1
      max_qos_depth: 10
      # 4 threads = 1 par famille de topics (tachometer, lidar, imu, control)
      num_threads: 4
      # 20 MB — nécessaire pour les pointclouds LiDAR Hesai/RSLidar
      send_buffer_limit: 20000000
      use_sim_time: false
      capabilities:
        - clientPublish
        - parameters
        - parametersSubscribe
        - services
        - connectionGraph
        - assets
      include_hidden: false
      asset_uri_allowlist:
        - "^package://(?:\\w+/)*\\w+\\.(?:dae|fbx|glb|gltf|jpeg|jpg|mtl|obj|png|stl|tif|tiff|urdf|webp|xacro)$"
