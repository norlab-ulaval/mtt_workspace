services:
  base:
    image: ${MTT_IMAGE:-mtt_workspace:devel}
    working_dir: ${WORKSPACE}
    environment:
      - WORKSPACE
      - ROS_DOMAIN_ID
      - RMW_IMPLEMENTATION
      - USER=mtt
      - HOME=/home/mtt
      - DISPLAY
      - WAYLAND_DISPLAY
      - XDG_RUNTIME_DIR
    stop_signal: SIGINT
    volumes:
      - ${WORKSPACE}:${WORKSPACE}
      - ${HOME}/.ros:/home/mtt/.ros
      - ${HOME}/.bash_history:/home/mtt/.bash_history
      - ${HOME}/.config/ros.org:/home/mtt/.config/ros.org
      - ${HOME}/.gazebo:/home/mtt/.gazebo
      - ${HOME}/.gitconfig:/home/mtt/.gitconfig:ro
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - /dev:/dev

  # Extends base with NVIDIA GPU access.
  # Uses NVIDIA_VISIBLE_DEVICES (modern approach) instead of deploy.resources so the
  # container starts normally on hosts without nvidia-container-toolkit installed.
  # When nvidia-ctk is configured as the default Docker runtime, the GPU is passed
  # through automatically; without it the var is simply ignored.
  gpu_base:
    extends:
      service: base
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all

  ros_runtime_base:
    extends:
      service: gpu_base
    network_mode: host
    pid: host
    ipc: host
    shm_size: '256m'
    cap_add:
      - NET_ADMIN
      - NET_RAW

  x11_base:
    extends:
      service: ros_runtime_base
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ${XDG_RUNTIME_DIR:-/run/user/1000}:${XDG_RUNTIME_DIR:-/run/user/1000}
      - ${HOME}/.Xauthority:/home/mtt/.Xauthority:ro
      - /dev/dri:/dev/dri
      - /dev/input:/dev/input
    environment:
      - XAUTHORITY=/home/mtt/.Xauthority
