mtt_can_node:
  ros__parameters:
    steer_control_mode: closed_loop
    cmd_angular_mode: normalized_steer
    tachometer_mode: real
    invert_inferred_tachometer_direction: false
    # max_linear_speed_ms: physical top speed of the robot at throttle_byte=230.
    # Formula: throttle_byte = (|cmd_vel.linear.x| / max_linear_speed_ms) * 230
    # MUST match speed_servo.yaml max_speed_ms — otherwise speed servo output is scaled wrong.
    # Current configured ceiling: 5.56 m/s ~= 20 km/h at throttle_byte=230.
    # Recalibrate after running mtt_speed_servo_node mode: "characterize" on the real robot.
    max_linear_speed_ms: 5.56
    command_timeout_seconds: 0.25
    servo_steer_timeout_s: 0.25   # servo override expires after 0.25s without refresh
    throttle_deadband: 0.02
    # The MTT firmware/motor controller has a real start threshold: small
    # throttle bytes do not move the tracks. Keep cmd_vel physical in m/s, but
    # lift any non-zero motion command above the hardware deadzone.
    # 0.27 ~= the observed 1.5 m/s start threshold with max_linear_speed_ms=5.56.
    min_moving_throttle: 0.27
    moving_command_deadband_ms: 0.05
    parking_brake_dither_boost: 0.15       # Throttle added above deadband: 27% + 15% = 42%
    parking_brake_dither_max_speed: 0.50   # Ejection threshold: Hold → Decelerate if exceeded
    # Speed below which the relay can safely flip direction (motor controller internal safety).
    # Must be tuned on the real robot.  Conservative default: 0.05 m/s.
    parking_brake_relay_flip_speed_ms: 0.05
    # Drift speed that triggers directed (asymmetric) dither instead of symmetric.
    # Must be below relay_flip_speed_ms.
    parking_brake_slip_detect_ms: 0.02
    steer_deadband: 0.05
    min_steer_speed_ms: 0.1
    model_wheelbase_m: 2.4
    model_max_articulation_deg: 60.0
    model_speed_response_gain: 3.0
    model_articulation_response_gain: 0.8
    model_brake_gain: 1.0
    model_use_slip_heuristic: true
    model_yaw_slip_base: 0.10
    model_yaw_slip_speed_gain: 0.05
    model_yaw_slip_articulation_gain: 0.15
    model_yaw_slip_min_scale: 0.55
    hold_assist_enabled: true
    hold_assist_entry_speed_ms: 0.08
    hold_assist_exit_command_ms: 0.08
    hold_assist_exit_speed_ms: 0.15
    hold_assist_kp: 2.5
    hold_assist_output_limit: 0.40
    publish_can_debug: false
    can_debug_topic: mtt_can/debug_frames

mtt_articulation_sensor_node:
  ros__parameters:
    serial_port: "/dev/serial/by-id/usb-STMicroelectronics_STM32_STLink_066EFF373146363143225155-if02"
    baud_rate: 921600
    publish_rate_hz: 50.0
    filter_window_size: 50
    # Convention: positive = LEFT turn (CCW/REP-103), negative = RIGHT.
    # The LUT (low bits≈+48°, high bits≈-49°) already follows this convention.
    invert_sign: false
    angle_offset_rad: 0.0
    bit_coords: [82.0, 214.0, 313.0, 430.0, 510.0, 600.0, 723.0, 831.0, 929.0, 1028.0, 1128.0, 1201.0, 1306.0, 1410.0, 1529.0, 1628.0, 1737.0, 1826.0, 1906.0, 2016.0, 2119.0, 2226.0, 2337.0, 2443.0, 2520.0, 2617.0, 2716.0, 2815.0, 2908.0, 3052.0, 3106.0, 3258.0, 3323.0, 3408.0]
    angle_coords_deg: [48.0, 43.0, 40.0, 36.0, 35.0, 32.0, 29.0, 25.0, 23.0, 20.0, 18.0, 15.0, 12.0, 9.0, 5.0, 2.0, 0.0, -2.0, -4.0, -7.0, -8.0, -10.0, -14.0, -18.0, -20.0, -21.0, -28.0, -26.0, -30.0, -35.0, -40.0, -43.0, -45.0, -49.0]
    # Pitch potentiometer (ADC1, 8-bit). Set pitch_deg_per_bit after calibration on flat terrain.
    pitch_invert_sign: false
    pitch_angle_offset_rad: 0.0
    pitch_bits_zero: 128.0
    pitch_deg_per_bit: 0.0          # TODO: calibrate — measure ADC1 on flat terrain

mtt_odometry_node:
  ros__parameters:
    steer_control_mode: closed_loop
    cmd_angular_mode: normalized_steer
    pivot_turn_enabled: false
    min_turn_speed_ms: 0.05
    yaw_slip_factor: 1.0
    max_articulation_deg: 60.0
    hardware_articulation_topic: /hardware/articulation_angle
    hardware_articulation_timeout_seconds: 0.5
    articulation_state_topic: ""
    use_articulation_state_lidar: false
    model_wheelbase_m: 2.4
    model_max_articulation_deg: 60.0
    model_speed_response_gain: 3.0
    model_articulation_response_gain: 0.8
    model_brake_gain: 1.0
    model_use_slip_heuristic: true
    model_yaw_slip_base: 0.10
    model_yaw_slip_speed_gain: 0.05
    model_yaw_slip_articulation_gain: 0.15
    model_yaw_slip_min_scale: 0.55
    # IMU yaw rate fusion — uses /mti100/data (Madgwick-filtered, 100 Hz).
    # imu_yaw_rate_sign: -1.0 is the code default (MTi-100 z-axis convention).
    # Flip to 1.0 if yaw diverges on first live test.
    # imu_complementary_alpha: 0.7 blends 70% IMU + 30% model when model is valid.
    imu_yaw_rate_topic: /mti100/data
    imu_yaw_rate_timeout_seconds: 0.2
    imu_yaw_rate_sign: -1.0
    # /mti100/data is already bias-compensated upstream (bias_observer →
    # bias_compensator chain in mti100.launch.py), so the default here is 0.0.
    # Measured 2026-06-11 on mtt_calibration_test_garage_2026-06-02_09-01-53:
    # gyro z mean = -0.00006 rad/s, Madgwick yaw drift 0.21°/min.
    # The previous empirical 0.0195 only applied to a bag recorded without
    # active compensation — on compensated bags it INJECTS a -1.1°/s drift.
    # For replay of uncompensated bags, override REPLAY_ODOM_IMU_BIAS instead
    # (measure with scripts/analyze_imu_bias.py).
    imu_yaw_rate_bias_rad_s: 0.0
    imu_complementary_alpha: 0.7
    use_imu_heading: true

mtt_joint_state_builder_node:
  ros__parameters:
    publish_rate_hz: 50.0
    articulation_topic: /hardware/articulation_angle
    tachometer_topic: mtt_tachometer
    joint_state_topic: joint_states
    pitch_rest_rad: -1.5707963267948966
    yaw_rest_rad: 0.0
    roll_rest_rad: -1.5707963267948966
    articulation_sign: 1.0
    max_articulation_deg: 60.0
    trailer_left_link_rest_rad: 0.0
    trailer_right_link_rest_rad: 0.0
    drive_joint_radius_m: 0.0202
    drive_joint_rotation_sign: -1.0
    trailer_wheel_radius_m: 0.0508
    left_wheel_rotation_sign: 1.0
    right_wheel_rotation_sign: 1.0
