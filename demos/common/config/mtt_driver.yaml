mtt_can_node:
  ros__parameters:
    steer_control_mode: closed_loop
    cmd_angular_mode: normalized_steer
    tachometer_mode: cmd_sim
    invert_inferred_tachometer_direction: true
    max_linear_speed_ms: 1.0
    throttle_deadband: 0.04
    steer_deadband: 0.05
    min_steer_speed_ms: 0.1
    model_wheelbase_m: 2.4
    model_max_articulation_deg: 60.0
    model_speed_response_gain: 3.0
    model_articulation_response_gain: 0.8
    model_brake_gain: 1.0
    model_use_slip_heuristic: true
    model_yaw_slip_base: 0.10
    model_yaw_slip_speed_gain: 0.05
    model_yaw_slip_articulation_gain: 0.15
    model_yaw_slip_min_scale: 0.55
    hold_assist_enabled: true
    hold_assist_entry_speed_ms: 0.03
    hold_assist_release_speed_ms: 0.015
    hold_assist_exit_command_ms: 0.08
    hold_assist_kp: 1.2
    hold_assist_ki: 0.8
    hold_assist_integrator_limit: 0.25
    hold_assist_output_limit: 0.35
    hold_assist_deadband_compensation: 0.12
    hold_assist_dither_enabled: false
    hold_assist_dither_amplitude: 0.02
    hold_assist_dither_frequency_hz: 6.0
    publish_can_debug: false
    can_debug_topic: mtt_can/debug_frames

mtt_odometry_node:
  ros__parameters:
    steer_control_mode: closed_loop
    cmd_angular_mode: normalized_steer
    pivot_turn_enabled: false
    min_turn_speed_ms: 0.05
    yaw_slip_factor: 1.0
    max_articulation_deg: 60.0
    model_wheelbase_m: 2.4
    model_max_articulation_deg: 60.0
    model_speed_response_gain: 3.0
    model_articulation_response_gain: 0.8
    model_brake_gain: 1.0
    model_use_slip_heuristic: true
    model_yaw_slip_base: 0.10
    model_yaw_slip_speed_gain: 0.05
    model_yaw_slip_articulation_gain: 0.15
    model_yaw_slip_min_scale: 0.55

mtt_joint_state_builder_node:
  ros__parameters:
    publish_rate_hz: 50.0
    articulation_topic: mtt_articulation_angle
    tachometer_topic: mtt_tachometer
    joint_state_topic: joint_states
    pitch_rest_rad: -1.5707963267948966
    yaw_rest_rad: 1.5707963267948966
    roll_rest_rad: -1.5707963267948966
    articulation_sign: 1.0
    max_articulation_deg: 60.0
    trailer_left_link_rest_rad: 0.0
    trailer_right_link_rest_rad: 0.0
    drive_joint_radius_m: 0.0202
    drive_joint_rotation_sign: -1.0
    trailer_wheel_radius_m: 0.0508
    left_wheel_rotation_sign: 1.0
    right_wheel_rotation_sign: 1.0
