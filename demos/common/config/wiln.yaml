/**:
  wiln_node:
    ros__parameters:
      follow_path_topic: /follow_path
      enable_mapping_service: /mapping/enable_mapping
      disable_mapping_service: /mapping/disable_mapping
      save_map_service: /mapping/save_map
      load_map_service: /mapping/load_map
      trajectory_speed: 0.40
      smoothing_window_size: 15
      robot_model: mtt
      kappa_max: 0.70
      # Must match mtt_path_follower psi_max_rad (60° = 1.047 rad)
      articulation_limit_rad: 1.047
