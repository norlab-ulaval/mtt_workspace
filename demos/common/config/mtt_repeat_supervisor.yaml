/**:
  mtt_repeat_supervisor:
    ros__parameters:
      health_topic: /mtt_health
      icp_odom_topic: /mapping/icp_odom
      teleop_topic: cmd_vel/manual
      deadman_topic: mtt_control/teleop_deadman
      controller_cmd_vel_topic: controller/cmd_vel
      selected_mode_topic: mtt_control/selected_mode
      selected_source_topic: mtt_control/selected_source
      auto_enabled_topic: mtt_control/auto_mode_enabled
      state_topic: mtt_repeat/state
      ready_topic: mtt_repeat/ready
      wiln_command_topic: /wiln/command
      request_auto_service: mtt_control/request_auto
      request_manual_service: mtt_control/request_manual
      health_timeout_s: 1.0
      # 2.0s gives the mapper time to recover from a short rejection burst
      # (2-3 scans at 10 Hz = 0.2-0.3s). The path follower still stops at
      # odom_timeout_s=2.5s (PathFollower.cpp) — robot halts; only replay
      # cancel is delayed to avoid killing the mission prematurely.
      icp_timeout_s: 2.0
      teleop_override_linear_threshold: 0.05
      teleop_override_angular_threshold: 0.05
      replay_idle_timeout_s: 1.0
      replay_startup_timeout_s: 5.0
      monitor_rate_hz: 10.0
