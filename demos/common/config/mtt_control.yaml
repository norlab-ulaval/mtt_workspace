mtt_operator_input_node:
  ros__parameters:
    # Nominal teleop ceiling: 4.2 m/s ~= 15 km/h.
    # Physical CAN scaling is set separately by mtt_can_node.max_linear_speed_ms.
    max_linear_speed: 4.2
    max_angular_command: 0.4
    linear_deadband: 0.03
    angular_deadband: 0.05
    linear_expo: 1.0
    angular_expo: 1.1
    manual_activity_linear_threshold: 0.05
    manual_activity_angular_threshold: 0.05
    deadman_button_index: 5
    light_button_index: 2
    articulation_hold_button_index: 10
    steer_mode_switch_button_index: 4
    enable_steering_mode_switch: true
    linear_axis_index: 1
    angular_axis_index: 3
    brake_axis_index: 5
    estop_left_trigger_axis: 2
    estop_right_trigger_axis: 5
    estop_trigger_threshold: -0.10
    invert_linear_axis: false
    invert_angular_axis: false
    enable_brake_axis: true
    # Calibrated fail-safe brake mapping.  With default_trig_val=1.0 in joy_linux,
    # the RT axis reads 1.0 (released) at boot → brake_value=0 until actually pressed.
    brake_axis_released: 1.0
    brake_axis_pressed: -1.0
    brake_full_fraction: 0.6
    joy_timeout_s: 0.25
    articulation_hold_mode_default: false
    articulation_hold_enabled: false
    parking_brake_dither_amplitude: 0.30
    articulation_hold_reset_on_deadman_release: true
    # ---- COM motor — bouton 7 actions (durée d'appui) ----
    # Appui court  (< 1.5s)        → toggle COM ON/OFF (stick droit ↔ moteur COM)
    # Appui moyen  (1.5s – 4.0s)   → set_home (sauve position actuelle comme home)
    # Appui long   (> 4.0s)        → park (retour automatique au home)
    enable_com_mode_switch: true
    com_toggle_button_index: 7
    invert_com_steer: false
    com_short_press_max_s: 1.5
    com_long_press_min_s: 4.0

mtt_manual_cmd_filter_node:
  ros__parameters:
    input_topic: cmd_vel/manual_raw
    output_topic: cmd_vel/manual
    input_timeout_s: 0.4
    publish_rate_hz: 50.0
    linear_rise_rate: 2.1
    linear_fall_rate: 3.5
    angular_rise_rate: 2.0
    angular_fall_rate: 3.0
    immediate_angular_zero: true
    # Feedforward decel: when stick released, briefly command
    # -gain * current_output to create motor counter-thrust.
    # No tachometer needed. 0.35 → ~35% reverse throttle at max speed.
    decel_brake_gain: 0.20
    decel_brake_threshold: 0.05
    enable_dynamic_filter: false
    linear_omega_n: 8.0
    linear_zeta: 1.0
    angular_omega_n: 10.0
    angular_zeta: 1.0

mtt_mode_manager_node:
  ros__parameters:
    button_auto_index: 0
    button_manual_index: 3
    button_stop_index: 1
    startup_hold_s: 0.0
    publish_rate_hz: 20.0
    request_auto_service: mtt_control/request_auto
    request_manual_service: mtt_control/request_manual
    request_stop_service: mtt_control/request_stop

mtt_cmd_arbiter_node:
  ros__parameters:
    manual_cmd_topic: cmd_vel/manual
    auto_cmd_topic: controller/cmd_vel
    output_cmd_topic: cmd_vel
    source_topic: mtt_control/selected_source
    publish_rate_hz: 50.0
    manual_timeout_s: 0.5
    auto_timeout_s: 0.5
    mode_switch_hold_s: 0.15
    manual_requires_deadman: true
