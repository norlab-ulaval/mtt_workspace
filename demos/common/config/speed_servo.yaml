mtt_speed_servo_node:
  ros__parameters:
    # Operating mode:
    #   "speed"        — PI closed-loop speed tracking using tachometer feedback
    #   "characterize" — automated open-loop throttle ramp to build feedforward LUT
    #                    (hold deadman, robot drives forward at increasing speeds)
    #   "disabled"     — no output
    mode: "speed"

    control_frequency_hz: 50.0

    # Topics
    feedback_topic: "/mtt_tachometer"
    setpoint_topic: "/speed_setpoint"
    output_cmd_vel_topic: "controller/cmd_vel"

    # ── PI gains ─────────────────────────────────────────────────────────
    kp: 1.5
    ki: 0.8
    kd: 0.0
    integrator_limit: 0.30

    # ── Limits ───────────────────────────────────────────────────────────
    max_throttle: 1.0
    # max_speed_ms MUST equal mtt_can_node.max_linear_speed_ms.
    # The servo outputs (throttle * max_speed_ms) as cmd_vel.linear.x, which the CAN
    # node re-normalizes by max_linear_speed_ms. If they differ, throttle is wrong.
    max_speed_ms: 5.56
    max_accel_ms2: 2.0
    max_decel_ms2: 3.5

    # ── Feedforward LUT (speed_ms → throttle_normalized) ─────────────────
    # After running mode: "characterize", copy the YAML from the logs here
    # and set feedforward_gain: 1.0.
    feedforward_gain: 0.0
    feedforward_lut: []

    # ── Safety ───────────────────────────────────────────────────────────
    feedback_timeout_s: 0.50
    command_timeout_s: 0.50

    # ── Characterization ─────────────────────────────────────────────────
    characterize_throttle_step: 0.05
    characterize_settle_time_s: 3.0
    characterize_sample_time_s: 2.0
    max_characterize_speed_ms: 4.2
