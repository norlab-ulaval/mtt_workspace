mtt_route_manager:
  ros__parameters:
    routes_dir: "data/wiln_routes"
    route_file_name: "route.ltr"
    icp_odom_topic: "/mapping/icp_odom"
    health_topic: "/mtt_health"
    selected_mode_topic: "mtt_control/selected_mode"
    selected_source_topic: "mtt_control/selected_source"
    auto_enabled_topic: "mtt_control/auto_mode_enabled"
    deadman_topic: "mtt_control/teleop_deadman"
    obstacle_cloud_topic: "/wiln/obstacles"
    wiln_command_topic: "/wiln/command"
    mark_ready_service: "/mtt_repeat/mark_ready"
    play_line_service: "/mtt_repeat/play_line"
    cancel_service: "/mtt_repeat/cancel"
    request_manual_service: "mtt_control/request_manual"
    icp_timeout_s: 0.75
    health_timeout_s: 1.0
    max_start_distance_m: 2.0
    max_lateral_error_m: 1.25
    max_heading_error_rad: 1.2
    route_error_grace_s: 1.0
    min_obstacle_clearance_m: 0.75
    obstacle_corridor_half_width_m: 0.75
    obstacle_lookahead_m: 4.0
    require_obstacle_clearance: false
    cancel_on_obstacle_clearance: false
    front_obstacle_stop_topic: "/mtt_obstacle/stop_requested"
    front_obstacle_clearance_topic: "/mtt_obstacle/front_clearance_m"
    front_obstacle_status_topic: "/mtt_obstacle/hazard_status"
    front_obstacle_timeout_s: 1.0
    monitor_rate_hz: 10.0
