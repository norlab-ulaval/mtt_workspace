x-build: &mtt_devel_build
  context: ../..
  dockerfile: docker/Dockerfile
  target: devel
  args:
    ROS_DISTRO: ${ROS_DISTRO:-jazzy}
    RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}
    USERNAME: mtt
    USER_UID: ${UID:-1000}
    USER_GID: ${GID:-1000}

x-replay-base: &replay_base
  extends:
    file: ../../docker/common.yaml
    service: ros_runtime_base
  env_file:
    - ../../.env
  image: ${MTT_IMAGE:-mtt_workspace:devel}
  build: *mtt_devel_build
  pull_policy: never
  environment:
    ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
    RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}
    REPLAY_RATE: ${REPLAY_RATE:-1.0}
    # Path to the bag to replay — set in .env or on the command line:
    #   BAG_PATH=/path/to/bag dcr up
    BAG_PATH: ${BAG_PATH:-}

services:

  # ── Bag player with synthetic clock ──────────────────────────────────────
  # --clock: republishes bag timestamps as /clock → all nodes use bag time
  # --loop: loops the bag (remove for single-pass)
  # --rate: playback speed (1.0 = real-time, 0.5 = half speed for debug)
  bag_player:
    <<: [*replay_base]
    volumes:
      - ${WORKSPACE}/data:${WORKSPACE}/data
      - ${BAG_PATH:-${WORKSPACE}/data}:${BAG_PATH:-${WORKSPACE}/data}
    command:
      - bash
      - -lc
      - |
        if [ -z "$${BAG_PATH}" ]; then
          echo "ERROR: BAG_PATH is not set."
          echo "Usage: BAG_PATH=/path/to/session_or_bag docker compose up"
          exit 1
        fi
        PLAY_PATH="$${BAG_PATH}"
        if [ -f "$${PLAY_PATH}" ]; then
          PLAY_PATH="$$(dirname "$${PLAY_PATH}")"
        elif [ -d "$${PLAY_PATH}/bag" ] && [ -f "$${PLAY_PATH}/bag/metadata.yaml" ]; then
          PLAY_PATH="$${PLAY_PATH}/bag"
        fi
        if [ ! -f "$${PLAY_PATH}/metadata.yaml" ]; then
          echo "ERROR: resolved bag path '$${PLAY_PATH}' does not contain metadata.yaml"
          echo "You can pass:"
          echo "  - a session directory (contains bag/)"
          echo "  - a bag directory (contains metadata.yaml)"
          echo "  - a .mcap file inside the bag directory"
          exit 1
        fi
        echo "==================================================="
        echo " MTT Bag Replay"
        echo "   Input:  $${BAG_PATH}"
        echo "   Bag:    $${PLAY_PATH}"
        echo "   Rate:   ${REPLAY_RATE:-1.0}x"
        echo "==================================================="
        if [ -f "$$(dirname "$${PLAY_PATH}")/session_info.yaml" ]; then
          echo "Session info:"
          cat "$$(dirname "$${PLAY_PATH}")/session_info.yaml"
          echo "---"
        fi
        EXCLUDE_TOPICS=(
          /robot_description /joint_states /runtime_joint_states /tf /tf_static
          /merged_points /merged_points_raw /merged_points_filtered /hesai_in_base /rsairy_in_base
          /trailer/angle /trailer/pose
          /trailer/body_markers /trailer/trailer_roi_cloud
          /planned_trajectory /real_trajectory
          /wiln/pose /wiln/markers /wiln/obstacles
          /wiln/trajectory /wiln/global_plan /wiln/control/local_plan
          /wiln/debug/deformed_plan /wiln/debug/horizon /wiln/replay/diagnostics
          /mtt_route/active_path /mtt_route/closest_pose /mtt_route/error_marker
          /mtt_route/start_pose /mtt_route/status_text /mtt_route/safety_status
          /localization/articulation_angle /localization/articulation_pitch
          /trailer/odom /trailer/pose_in_map
          /zed/zed_node/pose /zed/zed_node/odom
        )
        if [ "$${REPLAY_USE_RECORDED_MAPPING:-false}" != "true" ]; then
          EXCLUDE_TOPICS+=(
            /mapping/icp_odom /mapping/map /mapping/pose_in
            /mapping/scan_after_deskew /mapping/scan_after_input_filters
            /mapping/trajectory_path /mapping/aligned_scan
          )
        else
          echo "Replay mode: keeping recorded /mapping/* topics from the bag."
          echo "Do not run this together with the 'mapping' profile."
        fi
        exec ros2 bag play \
          --clock \
          --rate ${REPLAY_RATE:-1.0} \
          --storage mcap \
          --exclude-topics "$${EXCLUDE_TOPICS[@]}" \
          --qos-profile-overrides-path ${WORKSPACE}/src/external/norlab_robot/config/rosbag_record/qos_replay_override.yaml \
          "$${PLAY_PATH}"

  # ── Robot description publisher (needed for TF from URDF) ────────────────
  # CRITICAL: use_sim_time:=true required for bag replay.
  # Without it, robot_state_publisher publishes TF with wall-clock timestamps
  # while the bag player emits /clock at bag timestamps → TF2 lookups at bag
  # time fail ("TF_FUTURE_TRANSFORM") and the robot model is invisible in Foxglove.
  #
  # Note: the bag also contains /tf_static from the recording session.
  # robot_state_publisher publishes /tf_static from the current URDF (calibrated).
  # TF2 merges both; for the same (parent,child) pair the last-published wins —
  # the description service value (current calibration) overrides the bag value.
  description:
    <<: [*replay_base]
    depends_on:
      bag_player:
        condition: service_started
    command:
      - ros2
      - launch
      - ${WORKSPACE}/src/external/norlab_robot/launch/include/description.launch.py
      - use_joint_state_publisher:=false
      - use_sim_time:=true

  # ── ZED detections → Foxglove markers ────────────────────────────────────
  # Converts zed_msgs/ObjectsStamped into visualization_msgs/MarkerArray so
  # Foxglove can show detected people/objects in the 3D panel.
  zed_markers:
    <<: [*replay_base]
    profiles: ["zed"]
    depends_on:
      bag_player:
        condition: service_started
    command:
      - python3
      - -u
      - ${WORKSPACE}/scripts/zed_objects_to_markers.py
      - --only-person

  # ── Runtime odometry rebuild for replay ──────────────────────────────────
  # Older bags do not always carry a usable articulated body state for the
  # current URDF. Re-run the current odometry node on top of the recorded
  # tachometer/cmd_vel stream, but keep its outputs on replay-local topics.
  runtime_odometry:
    <<: [*replay_base]
    depends_on:
      bag_player:
        condition: service_started
    command:
      - ros2
      - run
      - mtt_driver
      - mtt_odometry_node_exe
      - --ros-args
      - --params-file
      - ${WORKSPACE}/demos/common/config/mtt_driver.yaml
      - -p
      - use_sim_time:=true
      - -p
      - broadcast_tf:=true
      - -p
      - cmd_vel_topic:=cmd_vel
      - -p
      - hardware_articulation_topic:=${REPLAY_ODOM_ARTICULATION_TOPIC:-/mtt_articulation_angle}
      - -p
      - articulation_state_topic:=${REPLAY_ODOM_ARTICULATION_STATE_TOPIC:-/unused/articulation_state}
      - -p
      - articulation_state_output_topic:=mtt/articulation_state/runtime
      - -p
      - use_articulation_state_lidar:=false
      - -p
      - imu_yaw_rate_topic:=${REPLAY_ODOM_IMU_TOPIC:-/unused/imu}
      - -p
      - imu_yaw_rate_sign:=${REPLAY_ODOM_IMU_YAW_SIGN:--1.0}
      - -p
      - imu_yaw_rate_timeout_seconds:=0.2
      - -r
      - mtt_odometry:=mtt_odometry/runtime
      - -r
      - mtt_articulation_angle:=mtt_articulation_angle/runtime

  # ── Joint-state reconstruction from replay-local articulation + tachometer ─
  # One shared builder owns the articulated visualization in replay and in
  # simulation. The bag keeps sensors and odometry, but not body TF/joint state.
  joint_state_builder:
    <<: [*replay_base]
    depends_on:
      runtime_odometry:
        condition: service_started
    command:
      - ros2
      - run
      - mtt_driver
      - mtt_joint_state_builder_node_exe
      - --ros-args
      - -p
      - use_sim_time:=true
      - -p
      - joint_state_topic:=joint_states
      - -p
      - articulation_topic:=mtt_articulation_angle/runtime
      - -p
      - tachometer_topic:=mtt_tachometer

  # ── Factor Graph localization in replay mode ──────────────────────────────
  # Fuses all recorded sensor topics.
  # use_sim_time:=true ensures the graph runs on bag timestamps.
  localization:
    <<: [*replay_base]
    profiles: ["localization"]
    depends_on:
      bag_player:
        condition: service_started
    command:
      - ros2
      - launch
      - mtt_localization
      - localization.launch.py
      - use_sim_time:=true

  # ── Offline ICP rebuild for one session or a whole data directory ────────
  # Replays the bag, rebuilds the merged cloud if both LiDARs are available,
  # runs the ICP mapper, and saves:
  #   <session>/offline_icp/map.vtk
  #   <session>/offline_icp/trajectory.vtk
  # plus top-level map.vtk/trajectory.vtk compatibility copies.
  #
  # Usage examples:
  #   BAG_PATH=${WORKSPACE}/data/mtt_nominal_outside_2026-04-30_16-08-13 \
  #     docker compose --profile offline_icp up offline_icp
  #
  #   docker compose --profile offline_icp up offline_icp
  #     → processes every mtt_* session under ${WORKSPACE}/data
  offline_icp:
    <<: [*replay_base]
    profiles: ["offline_icp"]
    volumes:
      - ${WORKSPACE}/data:${WORKSPACE}/data
      - ${BAGS_ROOT:-/data/mtt_bags}:${BAGS_ROOT:-/data/mtt_bags}
    environment:
      BAG_PATH: ${BAG_PATH:-}
      BAGS_ROOT: ${BAGS_ROOT:-/data/mtt_bags}
      DATA_DIR: ${DATA_DIR:-/data/mtt_bags}
      REPLAY_RATE: ${REPLAY_RATE:-1.0}
      OFFLINE_ICP_MODE: ${OFFLINE_ICP_MODE:-auto}
      OFFLINE_ICP_FORCE: ${OFFLINE_ICP_FORCE:-false}
      OFFLINE_ICP_QUALITY: ${OFFLINE_ICP_QUALITY:-standard}
      OFFLINE_ICP_SETTLE_S: ${OFFLINE_ICP_SETTLE_S:-4.0}
      OFFLINE_ICP_READY_TIMEOUT_S: ${OFFLINE_ICP_READY_TIMEOUT_S:-30.0}
      OFFLINE_ICP_PLAY_TIMEOUT_MARGIN_S: ${OFFLINE_ICP_PLAY_TIMEOUT_MARGIN_S:-90.0}
      OFFLINE_ICP_MAPPING_CONFIG: ${OFFLINE_ICP_MAPPING_CONFIG:-}
      OFFLINE_ICP_FILTER_TRAILER: ${OFFLINE_ICP_FILTER_TRAILER:-true}
      OFFLINE_ICP_MAPPING_ODOM_FRAME: ${OFFLINE_ICP_MAPPING_ODOM_FRAME:-odom}
      OFFLINE_ICP_EXPERIMENT_NAME: ${OFFLINE_ICP_EXPERIMENT_NAME:-}
    command:
      - python3
      - -u
      - ${WORKSPACE}/demos/bag_replay/scripts/offline_icp.py

  # ── Perception in replay ─────────────────────────────────────────────────────
  # Launches the full perception stack via perception.launch.py:
  #
  #   cloud_merger_node       — fuses Hesai + RS-Airy into /merged_points_filtered
  #                             (base_link frame, bbox-filtered, ~20 Hz)
  #   trailer_detector_node   — 2D PCA + 1D KF on raw RS-Airy cloud
  #                             → /trailer/articulation_angle (always launched)
  #   mtt_trailer_estimator_node — 10-DOF EKF in map frame, fuses:
  #                             - kinematic prior from /mtt_odometry + articulation angle
  #                             - /mapping/icp_odom when available (mapping profile)
  #                             - RS-Airy ICP on oriented ROI (10 Hz)
  #                             - Hesai ICP supplement (10 Hz, if enable_hesai=true)
  #                             → /trailer/pose, /trailer/odom, /trailer/pose_in_map,
  #                               /trailer/body_markers, /trailer/trailer_roi_cloud,
  #                               /trailer/articulation_angle (back-computed), TF map→trailer_body
  #
  # Set REPLAY_ENABLE_NEW_TRAILER_ESTIMATOR=false to use the legacy trailer_pose_node
  # (V4.0) instead — useful for A/B comparison.
  #
  # Depends on description so robot_state_publisher has published TF before
  # cloud_merger_node tries to transform clouds (hesai_lidar → base_link).
  # Depends on runtime_odometry for /mtt_odometry kinematic prior.
  perception:
    <<: [*replay_base]
    profiles: ["perception", "mapping"]
    depends_on:
      bag_player:
        condition: service_started
      description:
        condition: service_started
      runtime_odometry:
        condition: service_started
    command:
      - bash
      - -lc
      - |
        echo "Waiting for /clock and TF to settle..."
        sleep 3
        exec ros2 launch mtt_perception perception.launch.py \
          use_sim_time:=true \
          enable_new_trailer_estimator:=${REPLAY_ENABLE_NEW_TRAILER_ESTIMATOR:-true} \
          publish_filtered:=true \
          cloud_merger_max_pair_dt:=0.120 \
          cloud_merger_tf_timeout:=0.100 \
          cloud_merger_publish_debug_inputs:=true \
          cloud_merger_enable_trailer_bbox_filter:=${REPLAY_FILTER_TRAILER_FROM_MAPPING:-true}

  # ── ICP mapping in replay ────────────────────────────────────────────────
  # Baseline: single LiDAR /hesai_lidar/points — pas de cloud fusionné.
  # Le cloud fusionné (/merged_points_filtered) cumule deux problemes :
  #   1. ObservationDirectionDataPointsFilter sur nuage multi-origine = directions fausses.
  #   2. Dependance sur perception (cloud_merger_node) qui peut demarrer apres.
  # Pour activer le dual LiDAR dense: MAPPING_POINTS_TOPIC=/merged_points_filtered
  #   et MAPPING_CONFIG=.../config/mapping/_config_replay_dense.yaml
  mapping:
    <<: [*replay_base]
    profiles: ["mapping", "teach_repeat", "wiln_obstacles"]
    depends_on:
      bag_player:
        condition: service_started
      description:
        condition: service_started
      runtime_odometry:
        condition: service_started
    environment:
      MAPPING_POINTS_TOPIC: ${MAPPING_POINTS_TOPIC:-/hesai_lidar/points}
      MAPPING_CONFIG: ${MAPPING_CONFIG:-${WORKSPACE}/src/external/norlab_robot/config/mapping/_config.yaml}
      MAPPING_COMPRESSION_VOXEL_SIZE: ${MAPPING_COMPRESSION_VOXEL_SIZE:-0.50}
      MAPPING_MAP_PUBLISH_RATE: ${MAPPING_MAP_PUBLISH_RATE:-0.05}
      MAPPING_MAP_TF_PUBLISH_RATE: ${MAPPING_MAP_TF_PUBLISH_RATE:-50.0}
      MAPPING_MIN_INPUT_POINTS: ${MAPPING_MIN_INPUT_POINTS:-200}
      MAPPING_MAX_TRANSLATION_CORRECTION: ${MAPPING_MAX_TRANSLATION_CORRECTION:-2.50}
      MAPPING_MAX_ROTATION_CORRECTION_DEG: ${MAPPING_MAX_ROTATION_CORRECTION_DEG:-35.0}
      MAPPING_MAX_VELOCITY_MS: ${MAPPING_MAX_VELOCITY_MS:-8.0}
      MAPPING_MAX_YAW_RATE_DEG_S: ${MAPPING_MAX_YAW_RATE_DEG_S:-80.0}
      MAPPING_MAX_POSE_STEP_M: ${MAPPING_MAX_POSE_STEP_M:-4.0}
      MAPPING_MAX_Z_JUMP_M: ${MAPPING_MAX_Z_JUMP_M:-0.75}
      MAPPING_MAX_REGISTRATION_TIME_MS: ${MAPPING_MAX_REGISTRATION_TIME_MS:-3000.0}
      MAPPING_MAX_IDLE_TIME: ${MAPPING_MAX_IDLE_TIME:-10.0}
      MAPPING_DETERMINISTIC_MAP_UPDATE_DISTANCE_M: ${MAPPING_DETERMINISTIC_MAP_UPDATE_DISTANCE_M:-0.03}
      MAPPING_DETERMINISTIC_MAP_UPDATE_YAW_DEG: ${MAPPING_DETERMINISTIC_MAP_UPDATE_YAW_DEG:-0.5}
      MAPPING_DETERMINISTIC_MAP_MIN_DIST_NEW_POINT: ${MAPPING_DETERMINISTIC_MAP_MIN_DIST_NEW_POINT:-0.03}
      MAPPING_DESKEW: ${MAPPING_DESKEW:-true}
      MAPPING_INPUT_QOS_RELIABLE: ${MAPPING_INPUT_QOS_RELIABLE:-true}
      MAPPING_ODOM_FRAME: ${MAPPING_ODOM_FRAME:-odom}
      MAPPING_ROBOT_FRAME: ${MAPPING_ROBOT_FRAME:-base_footprint}
    command:
      - bash
      - -lc
      - |
        echo "Waiting for $${MAPPING_POINTS_TOPIC} before starting ICP mapper..."
        timeout 45 bash -lc 'until ros2 topic list | grep -qx "$${MAPPING_POINTS_TOPIC}"; do sleep 1; done' || {
          echo "ERROR: $${MAPPING_POINTS_TOPIC} not available"
          exit 1
        }
        echo "Waiting for replay odometry TF before starting ICP mapper..."
        timeout 45 bash -lc 'until ros2 topic info /mtt_odometry/runtime 2>/dev/null | grep -qE "Publisher count: [1-9]"; do sleep 1; done' || {
          echo "WARN: /mtt_odometry/runtime not visible yet; starting mapper anyway."
        }
        sleep 2
        exec ros2 launch norlab_robot mapping.launch.py \
          use_sim_time:=true \
          mapping_points_topic:=$${MAPPING_POINTS_TOPIC} \
          mapping_config:=$${MAPPING_CONFIG} \
          mapping_deskew:=$${MAPPING_DESKEW} \
          mapping_compression_voxel_size:=$${MAPPING_COMPRESSION_VOXEL_SIZE} \
          mapping_map_publish_rate:=$${MAPPING_MAP_PUBLISH_RATE} \
          mapping_map_tf_publish_rate:=$${MAPPING_MAP_TF_PUBLISH_RATE} \
          mapping_min_input_points:=$${MAPPING_MIN_INPUT_POINTS} \
          mapping_max_translation_correction:=$${MAPPING_MAX_TRANSLATION_CORRECTION} \
          mapping_max_rotation_correction_deg:=$${MAPPING_MAX_ROTATION_CORRECTION_DEG} \
          mapping_max_velocity_ms:=$${MAPPING_MAX_VELOCITY_MS} \
          mapping_max_yaw_rate_deg_s:=$${MAPPING_MAX_YAW_RATE_DEG_S} \
          mapping_max_pose_step_m:=$${MAPPING_MAX_POSE_STEP_M} \
          mapping_max_z_jump_m:=$${MAPPING_MAX_Z_JUMP_M} \
          mapping_max_registration_time_ms:=$${MAPPING_MAX_REGISTRATION_TIME_MS} \
          mapping_max_idle_time:=$${MAPPING_MAX_IDLE_TIME} \
          deterministic_map_update_distance_m:=$${MAPPING_DETERMINISTIC_MAP_UPDATE_DISTANCE_M} \
          deterministic_map_update_yaw_deg:=$${MAPPING_DETERMINISTIC_MAP_UPDATE_YAW_DEG} \
          deterministic_map_min_dist_new_point:=$${MAPPING_DETERMINISTIC_MAP_MIN_DIST_NEW_POINT} \
          mapping_input_qos_reliable:=$${MAPPING_INPUT_QOS_RELIABLE} \
          mapping_odom_frame:=$${MAPPING_ODOM_FRAME} \
          mapping_robot_frame:=$${MAPPING_ROBOT_FRAME}

  # ── WILN obstacle cloud regenerated in replay map frame ─────────────────
  # The bag may contain /wiln/obstacles from the live run, but those points
  # were published in the old recorded map frame. Rebuild them from LiDAR +
  # the current replay TF/ICP map so Foxglove's fixed "map" frame is coherent.
  wiln_obstacles:
    <<: [*replay_base]
    profiles: ["mapping", "teach_repeat", "wiln_obstacles"]
    depends_on:
      mapping:
        condition: service_started
    environment:
      WILN_PARAMS_FILE: ${WILN_PARAMS_FILE:-${WORKSPACE}/demos/common/config/wiln.yaml}
    command:
      - bash
      - -lc
      - |
        wait_for_topic() {
          topic="$1"
          timeout_s="$2"
          label="$3"
          echo "Waiting for $$label ($$topic)..."
          for i in $$(seq 1 "$$timeout_s"); do
            ros2 topic info "$$topic" 2>/dev/null | grep -qE "Publisher count: [1-9]" && return 0
            sleep 1
          done
          echo "ERROR: $$label ($$topic) not available after $${timeout_s}s"
          return 1
        }
        wait_for_topic /mapping/icp_odom 120 "Norlab ICP odom" || \
          echo "WARN: starting WILN obstacles anyway; replay timing may make ICP appear later."
        wait_for_topic /hesai_lidar/points 120 "Hesai cloud" || \
          echo "WARN: starting WILN obstacles anyway; replay timing may make the cloud appear later."
        wait_for_topic /mapping/map 120 "Norlab map" || \
          echo "WARN: starting WILN obstacles anyway; map TF may appear after the node starts."
        echo "Starting WILN obstacles with params: $${WILN_PARAMS_FILE}"
        exec ros2 run wiln wiln_obstacle_node \
          --ros-args \
          --params-file "$${WILN_PARAMS_FILE}" \
          -p use_sim_time:=true

  # ── Lightweight cloud for Foxglove/debug in replay ───────────────────────
  # Use this instead of visualizing raw /hesai_lidar/points when debugging
  # mapping/obstacles. It publishes a cropped, voxelized cloud.
  lidar_debug_cloud:
    <<: [*replay_base]
    profiles: ["mapping", "teach_repeat", "wiln_obstacles", "debug"]
    depends_on:
      bag_player:
        condition: service_started
    command:
      - python3
      - ${WORKSPACE}/scripts/pointcloud_voxel_debug.py
      - --ros-args
      - -p
      - use_sim_time:=true
      - -p
      - input_topic:=${LIDAR_DEBUG_INPUT_TOPIC:-/hesai_lidar/points}
      - -p
      - output_topic:=${LIDAR_DEBUG_OUTPUT_TOPIC:-/debug/hesai_points_voxel}
      - -p
      - voxel_size:=${LIDAR_DEBUG_VOXEL_SIZE:-0.30}
      - -p
      - max_rate_hz:=${LIDAR_DEBUG_MAX_RATE_HZ:-2.0}
      - -p
      - max_points:=${LIDAR_DEBUG_MAX_POINTS:-25000}

  audit_topics:
    <<: [*replay_base]
    profiles: ["debug", "mapping", "wiln_obstacles"]
    command:
      - python3
      - ${WORKSPACE}/scripts/audit_live_topics.py
      - --duration
      - ${AUDIT_DURATION:-30}

  audit_tf:
    <<: [*replay_base]
    profiles: ["debug", "mapping", "wiln_obstacles"]
    command:
      - python3
      - ${WORKSPACE}/scripts/audit_tf_chain.py
      - --duration
      - ${AUDIT_DURATION:-60}

  map_quality:
    <<: [*replay_base]
    profiles: ["debug", "mapping", "wiln_obstacles"]
    command:
      - python3
      - ${WORKSPACE}/scripts/icp_map_quality_check.py
      - --duration
      - ${AUDIT_DURATION:-120}

  # ── Post-process dataset export: ICP + lightweight enriched bag + CSV ──────
  # Writes per session:
  #   <session>/offline_icp/map.vtk
  #   <session>/offline_icp/trajectory.vtk
  #   <session>/postprocess_dataset/dataset.csv
  #   <session>/postprocess_dataset/enriched_bag/  (trailer pose/markers/debug only)
  #   <session>/postprocess_dataset/summary.yaml
  # and a global ${WORKSPACE}/data/postprocess_dataset_report.yaml.
  #
  # Default full pass:
  #   docker compose --profile postprocess up postprocess_dataset
  #
  # One session:
  #   BAG_PATH=${WORKSPACE}/data/mtt_nominal_outside_2026-04-30_16-08-13 \
  #     docker compose --profile postprocess up postprocess_dataset
  postprocess_dataset:
    <<: [*replay_base]
    profiles: ["postprocess", "dataset"]
    volumes:
      - ${WORKSPACE}/data:${WORKSPACE}/data
      - ${BAG_PATH:-${WORKSPACE}/data}:${BAG_PATH:-${WORKSPACE}/data}
      - ${BAGS_ROOT:-/data/mtt_bags}:${BAGS_ROOT:-/data/mtt_bags}
    environment:
      BAG_PATH: ${BAG_PATH:-}
      BAGS_ROOT: ${BAGS_ROOT:-/data/mtt_bags}
      DATA_DIR: ${DATA_DIR:-/data/mtt_bags}
      POSTPROCESS_RUN_ICP: ${POSTPROCESS_RUN_ICP:-true}
      POSTPROCESS_RUN_PERCEPTION: ${POSTPROCESS_RUN_PERCEPTION:-true}
      POSTPROCESS_RUN_ENRICHED_BAG: ${POSTPROCESS_RUN_ENRICHED_BAG:-true}
      POSTPROCESS_FORCE_ICP: ${POSTPROCESS_FORCE_ICP:-false}
      POSTPROCESS_FORCE_PERCEPTION: ${POSTPROCESS_FORCE_PERCEPTION:-false}
      POSTPROCESS_FORCE_ENRICHED_BAG: ${POSTPROCESS_FORCE_ENRICHED_BAG:-false}
      POSTPROCESS_QUALITY: ${POSTPROCESS_QUALITY:-max}
      REPLAY_RATE: ${REPLAY_RATE:-1.0}
    command:
      - bash
      - -lc
      - |
        INPUT_PATH="$${BAG_PATH:-$${DATA_DIR}}"
        ARGS=("$${INPUT_PATH}" "--quality" "$${POSTPROCESS_QUALITY}" "--replay-rate" "$${REPLAY_RATE}")
        if [ "$${POSTPROCESS_RUN_ICP}" = "true" ]; then
          ARGS+=("--run-icp")
        fi
        if [ "$${POSTPROCESS_RUN_ENRICHED_BAG}" = "true" ]; then
          ARGS+=("--run-enriched-bag")
        fi
        if [ "$${POSTPROCESS_FORCE_ICP}" = "true" ]; then
          ARGS+=("--force-icp")
        fi
        if [ "$${POSTPROCESS_FORCE_ENRICHED_BAG}" = "true" ]; then
          ARGS+=("--force-enriched-bag")
        fi
        exec python3 -u ${WORKSPACE}/scripts/build_postprocess_dataset.py "$${ARGS[@]}"

  # ── Metadata-only audit: fast preflight, no ROS replay and no bag decoding ──
  postprocess_metadata:
    <<: [*replay_base]
    profiles: ["postprocess", "dataset", "metadata"]
    volumes:
      - ${WORKSPACE}/data:${WORKSPACE}/data
      - ${BAG_PATH:-${WORKSPACE}/data}:${BAG_PATH:-${WORKSPACE}/data}
      - ${BAGS_ROOT:-/data/mtt_bags}:${BAGS_ROOT:-/data/mtt_bags}
    environment:
      BAG_PATH: ${BAG_PATH:-}
      BAGS_ROOT: ${BAGS_ROOT:-/data/mtt_bags}
      DATA_DIR: ${DATA_DIR:-/data/mtt_bags}
    command:
      - bash
      - -lc
      - |
        INPUT_PATH="$${BAG_PATH:-$${DATA_DIR}}"
        exec python3 -u ${WORKSPACE}/scripts/build_postprocess_dataset.py "$${INPUT_PATH}" --metadata-only

  # ── Post-process audit: CSV integrity + physical consistency + plots ──────
  # Reads existing postprocess_dataset outputs only. It does not replay bags,
  # does not run ICP, and does not record enriched bags.
  #
  # Writes per session:
  #   <session>/postprocess_dataset/audit.yaml
  #   <session>/postprocess_dataset/plots/*.png
  # and global:
  #   ${WORKSPACE}/data/postprocess_dataset_audit_report.yaml
  #   ${WORKSPACE}/data/postprocess_dataset_audit_summary.csv
  postprocess_audit:
    <<: [*replay_base]
    profiles: ["postprocess", "dataset", "audit"]
    volumes:
      - ${WORKSPACE}/data:${WORKSPACE}/data
      - ${BAG_PATH:-${WORKSPACE}/data}:${BAG_PATH:-${WORKSPACE}/data}
      - ${BAGS_ROOT:-/data/mtt_bags}:${BAGS_ROOT:-/data/mtt_bags}
    environment:
      BAG_PATH: ${BAG_PATH:-}
      BAGS_ROOT: ${BAGS_ROOT:-/data/mtt_bags}
      DATA_DIR: ${DATA_DIR:-/data/mtt_bags}
      POSTPROCESS_AUDIT_PLOTS: ${POSTPROCESS_AUDIT_PLOTS:-true}
      POSTPROCESS_AUDIT_STRICT: ${POSTPROCESS_AUDIT_STRICT:-false}
    command:
      - bash
      - -lc
      - |
        INPUT_PATH="$${BAG_PATH:-$${DATA_DIR}}"
        ARGS=("$${INPUT_PATH}")
        if [ "$${POSTPROCESS_AUDIT_PLOTS}" != "true" ]; then
          ARGS+=("--no-plots")
        fi
        if [ "$${POSTPROCESS_AUDIT_STRICT}" = "true" ]; then
          ARGS+=("--strict")
        fi
        exec python3 -u ${WORKSPACE}/scripts/audit_postprocess_dataset.py "$${ARGS[@]}"

  # ── ICP/mapping investigation: cross-bag consistency + plots ─────────────
  # Reads existing postprocess outputs only by default. It does not replay bags.
  # Writes:
  #   <session>/icp_investigation/report.yaml
  #   <session>/icp_investigation/summary.md
  #   <session>/icp_investigation/plots/*.png
  #   ${WORKSPACE}/data/icp_investigation_report.yaml
  #   ${WORKSPACE}/data/icp_investigation_summary.csv
  postprocess_icp_investigation:
    <<: [*replay_base]
    profiles: ["postprocess", "dataset", "audit", "investigate"]
    volumes:
      - ${WORKSPACE}/data:${WORKSPACE}/data
      - ${BAG_PATH:-${WORKSPACE}/data}:${BAG_PATH:-${WORKSPACE}/data}
      - ${BAGS_ROOT:-/data/mtt_bags}:${BAGS_ROOT:-/data/mtt_bags}
    environment:
      BAG_PATH: ${BAG_PATH:-}
      BAGS_ROOT: ${BAGS_ROOT:-/data/mtt_bags}
      DATA_DIR: ${DATA_DIR:-/data/mtt_bags}
      ICP_INVESTIGATION_PLOTS: ${ICP_INVESTIGATION_PLOTS:-true}
      ICP_INVESTIGATION_TF: ${ICP_INVESTIGATION_TF:-false}
      ICP_INVESTIGATION_STRICT: ${ICP_INVESTIGATION_STRICT:-false}
    command:
      - bash
      - -lc
      - |
        INPUT_PATH="$${BAG_PATH:-$${DATA_DIR}}"
        ARGS=("$${INPUT_PATH}")
        if [ "$${ICP_INVESTIGATION_PLOTS}" != "true" ]; then
          ARGS+=("--no-plots")
        fi
        if [ "$${ICP_INVESTIGATION_TF}" = "true" ]; then
          ARGS+=("--inspect-tf")
        fi
        if [ "$${ICP_INVESTIGATION_STRICT}" = "true" ]; then
          ARGS+=("--strict")
        fi
        exec python3 -u ${WORKSPACE}/scripts/investigate_icp_mapping.py "$${ARGS[@]}"

  # ── Offline localization reference from CSV dataset ───────────────────────
  # Converts postprocess_dataset/dataset.csv to the mtt_localization offline
  # solver input and runs offline_reference_solver. This is the bridge from the
  # database-style CSV exports to the factor-graph reference trajectory.
  postprocess_reference:
    <<: [*replay_base]
    profiles: ["postprocess", "dataset", "reference"]
    volumes:
      - ${WORKSPACE}/data:${WORKSPACE}/data
      - ${BAG_PATH:-${WORKSPACE}/data}:${BAG_PATH:-${WORKSPACE}/data}
      - ${BAGS_ROOT:-/data/mtt_bags}:${BAGS_ROOT:-/data/mtt_bags}
    environment:
      BAG_PATH: ${BAG_PATH:-}
      BAGS_ROOT: ${BAGS_ROOT:-/data/mtt_bags}
      DATA_DIR: ${DATA_DIR:-/data/mtt_bags}
      OFFLINE_REFERENCE_RUN_ICP: ${OFFLINE_REFERENCE_RUN_ICP:-false}
      OFFLINE_REFERENCE_FORCE_ICP: ${OFFLINE_REFERENCE_FORCE_ICP:-false}
    command:
      - bash
      - -lc
      - |
        INPUT_PATH="$${BAG_PATH:-$${DATA_DIR}}"
        ARGS=("$${INPUT_PATH}" "--from-postprocess-csv")
        if [ "$${OFFLINE_REFERENCE_RUN_ICP}" = "true" ]; then
          ARGS+=("--run-icp")
        fi
        if [ "$${OFFLINE_REFERENCE_FORCE_ICP}" = "true" ]; then
          ARGS+=("--force-icp")
        fi
        exec python3 -u ${WORKSPACE}/scripts/offline_reference.py "$${ARGS[@]}"

  # ── Sensor health check on bag output ────────────────────────────────────
  health_check:
    <<: [*replay_base]
    profiles: ["check"]
    depends_on:
      bag_player:
        condition: service_started
    environment:
      HEALTH_CHECK_DURATION: "20"
    command:
      - bash
      - -lc
      - |
        echo "Waiting 5s for bag player to settle..."
        sleep 5
        python3 ${WORKSPACE}/demos/data_collection/scripts/health_check.py

  # ── LiDAR-Camera colorizer for replay visualization ─────────────────────
  # Projects ZED2i RGB onto the Hesai PointCloud2 and publishes
  # /hesai_lidar/points_colored (keeps intensity + adds rgb field).
  # Usage: BAG_PATH=... docker compose --profile colorizer up bag_player description colorizer foxglove
  colorizer:
    <<: [*replay_base]
    profiles: ["colorizer"]
    depends_on:
      bag_player:
        condition: service_started
      description:
        condition: service_started
    command:
      - bash
      - -lc
      - |
        echo "Waiting for /clock and TF to settle..."
        sleep 3
        exec ros2 launch mtt_lidar_camera_colorizer colorizer.launch.py \
          use_sim_time:=true \
          image_transport:=compressed

  # ── Foxglove for replay visualization ────────────────────────────────────
  # Connect Foxglove Studio → "Open connection" → "Foxglove WebSocket" → ws://localhost:8765
  foxglove:
    <<: [*replay_base]
    depends_on:
      bag_player:
        condition: service_started
    command:
      - bash
      - -lc
      - |
        fuser -k 8765/tcp 2>/dev/null || true
        sleep 0.3
        echo "Foxglove WebSocket bridge → ws://localhost:8765"
        exec ros2 run foxglove_bridge foxglove_bridge \
          --ros-args \
          --params-file ${WORKSPACE}/src/external/norlab_robot/config/_foxglove_bridge.yaml \
          -p port:=8765

  # ── RViz (optional — requires X11 display on host) ───────────────────────
  # Usage: DISPLAY=:0 dc run --rm rviz
  # Or with X forwarding: ssh -X host → then dc run --rm rviz
  rviz:
    <<: [*replay_base]
    profiles: ["rviz"]
    environment:
      DISPLAY: ${DISPLAY:-:0}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    depends_on:
      bag_player:
        condition: service_started
      description:
        condition: service_started
    command:
      - ros2
      - launch
      - mtt_bringup
      - mtt_rviz.launch.py
      - use_sim_time:=true
      - rviz_config:=${WORKSPACE}/src/mtt_core/mtt_description/rviz/urdf_config.rviz

  # ── Teach-and-Repeat stack for offline WILN validation ───────────────────
  #
  # Runs wiln_node + mtt_path_follower + mtt_repeat_supervisor on top of a bag.
  # Workflow:
  #   1. Start:  BAG_PATH=... docker compose up bag_player description foxglove teach_repeat
  #   2. Record: ros2 service call /start_recording std_srvs/srv/Empty '{}'
  #              (watch bag play → poses arrive via /mapping/icp_odom)
  #   3. Stop:   ros2 service call /stop_recording std_srvs/srv/Empty '{}'
  #   4. Save:   ros2 service call /save_map_traj wiln/srv/SaveMapTraj '{file_name: {data: /workspace/data/route.ltr}}'
  #   5. Load:   ros2 service call /load_map_traj wiln/srv/LoadMapTraj '{file_name: {data: /workspace/data/route.ltr}}'
  #   6. Play:   ros2 service call /play_line std_srvs/srv/Empty '{}'
  #              → visualise /wiln/markers + wiln/deformed_plan in Foxglove
  #   7. Cancel: ros2 service call /cancel_trajectory std_srvs/srv/Empty '{}'
  #
  # Note: path follower will not actually drive the robot (no CAN bus).
  # The goal is to validate trajectory capture, save/load round-trip,
  # and planning/deformation visualisation in Foxglove.
  teach_repeat:
    <<: [*replay_base]
    profiles: ["teach_repeat"]
    depends_on:
      bag_player:
        condition: service_started
      description:
        condition: service_started
      wiln_obstacles:
        condition: service_started
    command:
      - bash
      - -lc
      - |
        echo "Waiting for /clock and ICP odom to settle..."
        sleep 4
        exec ros2 launch norlab_robot teach_repeat.launch.py \
          use_sim_time:=true \
          odom_topic:=/mapping/icp_odom \
          pose_topic:=/wiln/pose \
          wiln_cmd_vel_topic:=/cmd_vel \
          wiln_params_file:=${WORKSPACE}/demos/common/config/wiln.yaml \
          follower_params_file:=${WORKSPACE}/demos/common/config/mtt_path_follower.yaml \
          supervisor_params_file:=${WORKSPACE}/demos/common/config/mtt_repeat_supervisor.yaml \
          route_manager_params_file:=${WORKSPACE}/demos/common/config/mtt_route_manager.yaml \
          front_obstacle_params_file:=${WORKSPACE}/demos/common/config/mtt_front_obstacle_monitor.yaml \
          start_obstacle_node:=false

  wiln_validate_route:
    <<: [*replay_base]
    profiles: ["teach_repeat"]
    volumes:
      - ${WORKSPACE}/data:${WORKSPACE}/data
    environment:
      WILN_LTR_FILE: ${WILN_LTR_FILE:-${WORKSPACE}/data/route.ltr}
    command:
      - bash
      - -lc
      - |
        python3 ${WORKSPACE}/scripts/validate_wiln_route.py "$${WILN_LTR_FILE}"

  # ── Debug shell ───────────────────────────────────────────────────────────
  bash:
    <<: [*replay_base]
    profiles: ["debug"]
    volumes:
      - ${WORKSPACE}/data:${WORKSPACE}/data
    tty: true
    stdin_open: true
    command: bash
