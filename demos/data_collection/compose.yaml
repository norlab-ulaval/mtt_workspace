x-build: &mtt_devel_build
  context: ../..
  dockerfile: docker/Dockerfile
  target: devel
  network: host
  args:
    ROS_DISTRO: ${ROS_DISTRO:-jazzy}
    RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}
    USERNAME: mtt
    USER_UID: ${UID:-1000}
    USER_GID: ${GID:-1000}
    BASE_IMAGE: mtt_workspace:base

# ─── Base for all data-collection services ───────────────────────────────────
x-dc-base: &dc_base
  extends:
    file: ../../docker/common.yaml
    service: ros_runtime_base
  env_file:
    - ../../.env
    - ./config/runtime.env
  image: ${MTT_IMAGE:-mtt_workspace:devel}
  build: *mtt_devel_build
  pull_policy: never
  privileged: true
  environment:
    ROS_DOMAIN_ID: ${LIVE_ROBOT_DOMAIN_ID:-2}
    RMW_IMPLEMENTATION: ${MTT_RMW_IMPLEMENTATION:-rmw_zenoh_cpp}
    ROBOT_NAME: ${ROBOT_NAME:-mtt-hl}
    NORLAB_ROBOT_PATH: ${WORKSPACE}/src/external/norlab_robot
    ZENOH_ROUTER_CONFIG_URI: ${WORKSPACE}/src/external/norlab_robot/scripts/config/zenoh_router.json5
    ZENOH_SESSION_CONFIG_URI: ${WORKSPACE}/src/external/norlab_robot/scripts/config/zenoh_session.json5
    RMW_ZENOH_CONFIG_FILE: ${WORKSPACE}/src/external/norlab_robot/scripts/config/zenoh_session.json5
    RUST_LOG: ${ZENOH_RUST_LOG:-zenoh=info,zenoh_transport=warn}
    FIELD_NETWORK_MODE: ${FIELD_NETWORK_MODE:-false}
    DOODLE_ROBOT_IP: ${DOODLE_ROBOT_IP:-192.168.50.2}
    DOODLE_PC_IP: ${DOODLE_PC_IP:-192.168.50.101}
    ZENOH_FIELD_PORT: ${ZENOH_FIELD_PORT:-7447}
    FOXGLOVE_BIND_ADDRESS: ${FOXGLOVE_BIND_ADDRESS:-192.168.50.2}
    FOXGLOVE_PARAMS_FILE: ${FOXGLOVE_PARAMS_FILE:-${WORKSPACE}/src/external/norlab_robot/config/_foxglove_bridge.yaml}
    FOXGLOVE_FIELD_PARAMS_FILE: ${FOXGLOVE_FIELD_PARAMS_FILE:-${WORKSPACE}/src/external/norlab_robot/config/_foxglove_bridge_field_light.yaml}
    # Data collection session metadata — set by annotate_session.sh → .env
    EXPERIMENT_NAME: ${EXPERIMENT_NAME:-exp}
    SESSION_TYPE: ${SESSION_TYPE:-nominal}         # nominal | edge_case | calibration | motion_model
    TERRAIN: ${TERRAIN:-unknown}                   # neige_dure | sloche | boue | mixte | ...
    TRAILER_ATTACHED: ${TRAILER_ATTACHED:-false}   # true | false
    OPERATOR: ${OPERATOR:-unknown}
    WEATHER: ${WEATHER:-unknown}
    TEMPERATURE: ${TEMPERATURE:-0}                 # °C
    NOTES: ${NOTES:-}
    BAG_CACHE_SIZE_BYTES: ${BAG_CACHE_SIZE_BYTES:-268435456}
    BAG_DISK_MIN_GB: ${BAG_DISK_MIN_GB:-40}
    BAG_DISK_WARN_GB: ${BAG_DISK_WARN_GB:-80}
    LOCAL_FOXGLOVE_PORT: ${LOCAL_FOXGLOVE_PORT:-8765}
    DRIVER_PARAMS_FILE: ${WORKSPACE}/demos/common/config/mtt_driver.yaml
    HEALTH_PARAMS_FILE: ${WORKSPACE}/demos/common/config/mtt_health_monitor.yaml
    CONTROL_PARAMS_FILE: ${WORKSPACE}/demos/common/config/mtt_control.yaml
    FOLLOWER_PARAMS_FILE: ${WORKSPACE}/demos/common/config/mtt_path_follower.yaml
    SUPERVISOR_PARAMS_FILE: ${WORKSPACE}/demos/common/config/mtt_repeat_supervisor.yaml
    ROUTE_MANAGER_PARAMS_FILE: ${WORKSPACE}/demos/common/config/mtt_route_manager.yaml
    FRONT_OBSTACLE_PARAMS_FILE: ${WORKSPACE}/demos/common/config/mtt_front_obstacle_monitor.yaml
    WILN_PARAMS_FILE: ${WORKSPACE}/demos/common/config/wiln.yaml
  volumes:
    - /dev:/dev
    - /run/udev:/run/udev:ro
    # Bags go to workspace/data/ — persistent across container restarts
    - ${WORKSPACE}/data:${WORKSPACE}/data

services:

  # ── Zenoh router ──────────────────────────────────────────────────────────
  # No profile → starts automatically with dc up.
  # The robot service depends on it so the router is always up before ROS nodes
  # attempt to register. The fuser kill ensures no stale router from a previous
  # session is holding port 7447.
  zenoh:
    <<: [*dc_base]
    command:
      - bash
      - -c
      - |
        fuser -k 7447/tcp 2>/dev/null || true
        sleep 0.5
        if [ "$${FIELD_NETWORK_MODE:-false}" = "true" ]; then
          cfg="/tmp/zenoh_router_field_doodle.json5"
          sed \
            -e "s|__ROBOT_DOODLE_IP__|$${DOODLE_ROBOT_IP}|g" \
            -e "s|__ZENOH_PORT__|$${ZENOH_FIELD_PORT:-7447}|g" \
            "$${WORKSPACE}/src/external/norlab_robot/scripts/config/zenoh_router_field_doodle.template.json5" > "$${cfg}"
          export ZENOH_ROUTER_CONFIG_URI="$${cfg}"
          echo "FIELD_NETWORK_MODE=true: Zenoh router listening on tcp/$${DOODLE_ROBOT_IP}:$${ZENOH_FIELD_PORT:-7447}"
        else
          echo "FIELD_NETWORK_MODE=false: Zenoh router using $${ZENOH_ROUTER_CONFIG_URI}"
        fi
        exec ros2 run rmw_zenoh_cpp rmw_zenohd

  # ── Robot driver (CAN + odometry + operator control) ─────────────────────
  # Launches description (URDF/TF) + CAN setup + driver + joystick/teleop.
  # Sensors and mapping are separate restartable services below.
  # Restart individually:
  #   docker compose restart robot_driver   — restarts driver only
  #   docker compose restart sensors        — restarts all sensors
  #   docker compose restart mapping        — restarts ICP mapper
  robot_driver:
    <<: [*dc_base]
    privileged: true
    depends_on:
      zenoh:
        condition: service_started
    volumes:
      - /dev:/dev
      - /dev/input:/dev/input
      - /run/udev:/run/udev:ro
      - /dev/bus/usb:/dev/bus/usb
      - /usr/local/zed/settings:/usr/local/zed/settings:rw
      - /usr/local/zed/resources:/usr/local/zed/resources:rw
    command:
      - bash
      - -lc
      - |
        echo "=== robot_driver: CAN + odometry + operator control ==="
        echo "  driver:  $${DRIVER_PARAMS_FILE}"
        echo "  health:  $${HEALTH_PARAMS_FILE}"
        echo "  control: $${CONTROL_PARAMS_FILE}"
        echo "  teleop=$${ENABLE_TELEOP} joystick=$${ENABLE_JOYSTICK} joy_device=$${JOYSTICK_DEVICE}"
        exec ros2 launch norlab_robot live_robot.launch.py \
          warnings:=false \
          enable_sensors:=false \
          enable_mapping:=false \
          enable_perception:=false \
          enable_cloud_merger:=false \
          enable_teleop:=$${ENABLE_TELEOP} \
          enable_joystick:=$${ENABLE_JOYSTICK} \
          setup_real_can:=true \
          driver_params_file:=$${DRIVER_PARAMS_FILE} \
          health_params_file:=$${HEALTH_PARAMS_FILE} \
          control_params_file:=$${CONTROL_PARAMS_FILE} \
          joy_device:=$${JOYSTICK_DEVICE} \
          joy_deadzone:=$${JOYSTICK_DEADZONE}

  # ── Sensors (LiDAR + IMU + optional GPS/OAK) ─────────────────────────────
  # Launches Hesai XT-32 + RS-Airy + MTi-100 and optional peripherals.
  # Standalone sensors.launch.py — does NOT touch CAN or description.
  # Restart without killing the driver:  docker compose restart sensors
  sensors:
    <<: [*dc_base]
    privileged: true
    depends_on:
      robot_driver:
        condition: service_started
    volumes:
      - /dev:/dev
      - /dev/bus/usb:/dev/bus/usb
      - /run/udev:/run/udev:ro
      - /usr/local/zed/settings:/usr/local/zed/settings:rw
      - /usr/local/zed/resources:/usr/local/zed/resources:rw
    command:
      - bash
      - -lc
      - |
        echo "=== sensors: LiDAR + IMU + optional peripherals ==="
        echo "  gps=$${ENABLE_GPS:-false} oak=$${ENABLE_OAK:-false} mti10=$${ENABLE_MTI10:-false}"
        exec ros2 launch norlab_robot sensors.launch.py \
          warnings:=false \
          enable_gps:=$${ENABLE_GPS:-false} \
          enable_oak:=$${ENABLE_OAK:-false} \
          enable_mti10:=$${ENABLE_MTI10:-false} \
          gps_mode:=$${GPS_MODE} \
          gps_antennas:=$${GPS_ANTENNAS}

  # ── ICP Mapping ───────────────────────────────────────────────────────────
  # Norlab ICP mapper — restartable independently of sensors and driver.
  # Waits for LiDAR and odometry to be live before launching.
  # Restart without killing sensors:  docker compose restart mapping
  mapping:
    <<: [*dc_base]
    depends_on:
      robot_driver:
        condition: service_started
      sensors:
        condition: service_started
    command:
      - bash
      - -lc
      - |
        echo "=== mapping: Norlab ICP mapper ==="
        echo "  points: $${MAPPING_POINTS_TOPIC:-/hesai_lidar/points}"
        echo "  config: $${MAPPING_CONFIG:-default}"
        echo "  deskew=$${MAPPING_DESKEW} voxel=$${MAPPING_COMPRESSION_VOXEL_SIZE}"
        POINTS_TOPIC="$${MAPPING_POINTS_TOPIC:-/hesai_lidar/points}"
        echo "Waiting for LiDAR ($${POINTS_TOPIC})..."
        for i in $$(seq 1 60); do
          ros2 topic info "$${POINTS_TOPIC}" 2>/dev/null | grep -qE "Publisher count: [1-9]" && break
          [ "$$i" -eq 60 ] && echo "  WARNING: $${POINTS_TOPIC} not available after 60s — launching anyway" && break
          echo "  ($$i/60) Waiting for $${POINTS_TOPIC}..."
          sleep 1
        done
        echo "Waiting for odometry (/mtt_odometry)..."
        for i in $$(seq 1 30); do
          ros2 topic info /mtt_odometry 2>/dev/null | grep -qE "Publisher count: [1-9]" && break
          [ "$$i" -eq 30 ] && echo "  WARNING: /mtt_odometry not available after 30s — launching anyway" && break
          echo "  ($$i/30) Waiting for /mtt_odometry..."
          sleep 1
        done
        DELAY="$${MAPPING_DELAY_SECONDS:-10}"
        [ "$${DELAY}" -gt 0 ] && {
          echo "  Startup delay: $${DELAY}s (set MAPPING_DELAY_SECONDS=0 to skip)"
          sleep "$${DELAY}"
        }
        exec ros2 launch norlab_robot mapping.launch.py \
          use_sim_time:=false \
          mapping_deskew:=$${MAPPING_DESKEW} \
          mapping_compression_voxel_size:=$${MAPPING_COMPRESSION_VOXEL_SIZE} \
          mapping_map_publish_rate:=$${MAPPING_MAP_PUBLISH_RATE} \
          mapping_map_tf_publish_rate:=$${MAPPING_MAP_TF_PUBLISH_RATE} \
          mapping_min_input_points:=$${MAPPING_MIN_INPUT_POINTS} \
          mapping_max_translation_correction:=$${MAPPING_MAX_TRANSLATION_CORRECTION} \
          mapping_max_rotation_correction_deg:=$${MAPPING_MAX_ROTATION_CORRECTION_DEG} \
          mapping_max_velocity_ms:=$${MAPPING_MAX_VELOCITY_MS} \
          mapping_max_yaw_rate_deg_s:=$${MAPPING_MAX_YAW_RATE_DEG_S} \
          mapping_max_pose_step_m:=$${MAPPING_MAX_POSE_STEP_M} \
          mapping_max_z_jump_m:=$${MAPPING_MAX_Z_JUMP_M} \
          mapping_max_registration_time_ms:=$${MAPPING_MAX_REGISTRATION_TIME_MS} \
          deterministic_map_update_distance_m:=$${MAPPING_DETERMINISTIC_MAP_UPDATE_DISTANCE_M:-0.03} \
          deterministic_map_update_yaw_deg:=$${MAPPING_DETERMINISTIC_MAP_UPDATE_YAW_DEG:-0.5} \
          deterministic_map_min_dist_new_point:=$${MAPPING_DETERMINISTIC_MAP_MIN_DIST_NEW_POINT:-0.03} \
          mapping_points_topic:=$${MAPPING_POINTS_TOPIC} \
          mapping_config:=$${MAPPING_CONFIG:-$${WORKSPACE}/src/external/norlab_robot/config/mapping/_config.yaml} \
          mapping_input_qos_reliable:=$${MAPPING_INPUT_QOS_RELIABLE:-false} \
          mapping_odom_frame:=$${MAPPING_ODOM_FRAME:-odom} \
          mapping_robot_frame:=$${MAPPING_ROBOT_FRAME:-base_footprint}

  # ── Perception (trailer detector + cloud merger) ──────────────────────────
  # Launches trailer_detector_node + trailer_pose_node.
  # cloud_merger_node is included only if ENABLE_CLOUD_MERGER=true (default: false).
  # Optional — start with:  docker compose up --profile perception
  # ZED visualization scripts are separate services: zed_markers, zed_pose_viz
  perception:
    <<: [*dc_base]
    profiles: ["perception"]
    depends_on:
      robot_driver:
        condition: service_started
      sensors:
        condition: service_started
    command:
      - bash
      - -lc
      - |
        echo "=== perception: trailer detector + cloud_merger=$${ENABLE_CLOUD_MERGER:-false} ==="
        exec ros2 launch mtt_perception perception.launch.py \
          use_sim_time:=false \
          enable_cloud_merger:=$${ENABLE_CLOUD_MERGER:-false}

  # ── ZED object detections → Foxglove markers ─────────────────────────────
  # Converts zed_msgs/ObjectsStamped into visualization_msgs/MarkerArray.
  # Requires ZED2i running (started by sensors service).
  # Start with:  docker compose run --rm zed_markers
  zed_markers:
    <<: [*dc_base]
    profiles: ["perception"]
    depends_on:
      sensors:
        condition: service_started
    command:
      - python3
      - -u
      - ${WORKSPACE}/scripts/zed_objects_to_markers.py
      - --only-person

  # ── ZED pose path visualizer ──────────────────────────────────────────────
  # Publishes ZED odometry as a nav_msgs/Path for Foxglove trail visualization.
  # Requires ZED2i running (started by sensors service).
  # Start with:  docker compose run --rm zed_pose_viz
  zed_pose_viz:
    <<: [*dc_base]
    profiles: ["perception"]
    depends_on:
      sensors:
        condition: service_started
    command:
      - python3
      - -u
      - ${WORKSPACE}/scripts/zed_pose_visualizer.py

  # ── Localization: Factor Graph + Trailer Localizer ───────────────────────
  # Runs mtt_localization/localization.launch.py (live, no sim time).
  # Launches two nodes:
  #   - factor_graph_node: ISAM2 tractor pose + optimised φ
  #     Publishes: /localization/odom (SE(3) with 6×6 covariance)
  #                /localization/articulation_angle (optimised φ, std_msgs/Float64)
  #   - mtt_trailer_localizer_node: trailer SE(3) pose in map
  #     Publishes: /trailer/odom, /trailer/pose_in_map, TF map→trailer_body
  #
  # Profile "localization" — opt-in because it requires all sensors to be healthy.
  # Start with:  dc up --profile localization
  # Or add to your session:  dc run --rm localization
  #
  # Waits for /mtt/articulation_state and /mapping/icp_odom before launching
  # so that factor_graph_node starts with a valid prior.
  localization:
    <<: [*dc_base]
    profiles: ["localization"]
    depends_on:
      mapping:
        condition: service_started
    command:
      - bash
      - -lc
      - |
        echo "==================================================="
        echo " MTT Localization (Factor Graph + Trailer)"
        echo "==================================================="
        echo "Waiting for /mtt/articulation_state..."
        for i in $$(seq 1 60); do
          ros2 topic info /mtt/articulation_state 2>/dev/null | grep -qE "Publisher count: [1-9]" && break
          [ "$$i" -eq 60 ] && echo "  WARNING: /mtt/articulation_state not ready after 60s — launching anyway" && break
          echo "  ($$i/60) Waiting..."
          sleep 1
        done
        echo "Waiting for /mapping/icp_odom (Norlab ICP odom prior)..."
        for i in $$(seq 1 45); do
          ros2 topic info /mapping/icp_odom 2>/dev/null | grep -qE "Publisher count: [1-9]" && break
          [ "$$i" -eq 45 ] && echo "  WARNING: /mapping/icp_odom not ready after 45s — launching anyway" && break
          echo "  ($$i/45) Waiting..."
          sleep 1
        done
        echo "Starting localization stack..."
        exec ros2 launch mtt_localization localization.launch.py \
          use_sim_time:=false

  # ── Sensor health check (runs once, then exits) ───────────────────────────
  # Waits 10s for sensors to settle, checks frequencies for 15s.
  # Exits 0 if all required sensors OK. Record service starts regardless
  # (use `depends_on: health_check: condition: service_completed_successfully`
  #  if you want hard-blocking behavior).
  health_check:
    <<: [*dc_base]
    profiles: ["check"]    # only runs when explicitly requested: dcr check
    depends_on:
      robot_driver:
        condition: service_started
      sensors:
        condition: service_started
    environment:
      HEALTH_CHECK_DURATION: "15"
    command:
      - bash
      - -lc
      - |
        exec python3 ${WORKSPACE}/demos/data_collection/scripts/health_check.py

  # ── Bag recorder ─────────────────────────────────────────────────────────
  # Launch manually when ready:  dcr record  (or: dc up --profile record)
  # Stop cleanly with Ctrl+C — SIGINT lets ros2 bag record finalize the mcap.
  record:
    <<: [*dc_base]
    profiles: ["record"]
    stop_signal: SIGINT   # ros2 bag record needs SIGINT to finalize the bag cleanly
    stop_grace_period: 5m
    depends_on:
      robot_driver:
        condition: service_started
      sensors:
        condition: service_started
    command:
      - bash
      - -lc
      - |
        echo "==================================================="
        echo " MTT Data Collection"
        echo "   Experiment: $${EXPERIMENT_NAME}"
        echo "   Session:    $${SESSION_TYPE}"
        echo "   Terrain:    $${TERRAIN}"
        echo "   Trailer:    $${TRAILER_ATTACHED}"
        echo "   Operator:   $${OPERATOR}"
        echo "   Weather:    $${WEATHER}  $${TEMPERATURE}°C"
        echo "   GPS mode:   $${GPS_MODE}"
        echo "   Teleop:     $${ENABLE_TELEOP}  Joystick: $${ENABLE_JOYSTICK}"
        echo "   Driver cfg: $${DRIVER_PARAMS_FILE}"
        echo "   Control cfg:$${CONTROL_PARAMS_FILE}"
        echo "   WILN cfg:   $${WILN_PARAMS_FILE}"
        echo "   Storage:    ${WORKSPACE}/data/"
        echo "==================================================="
        # ── Disk space check — abort early rather than corrupt a bag ──
        DATA_DIR="${WORKSPACE}/data"
        mkdir -p "$$DATA_DIR"
        AVAIL_GB=$$(df -BG "$$DATA_DIR" | awk 'NR==2 {gsub("G",""); print $4}')
        MIN_FREE_GB="$${BAG_DISK_MIN_GB:-40}"
        WARN_FREE_GB="$${BAG_DISK_WARN_GB:-80}"
        echo "Available disk space in $$DATA_DIR: $${AVAIL_GB} GB"
        if [ "$${AVAIL_GB}" -lt "$${MIN_FREE_GB}" ]; then
          echo "ERROR: Less than $${MIN_FREE_GB} GB free in $$DATA_DIR ($${AVAIL_GB} GB available)."
          echo "       Free space before recording to avoid bag corruption."
          exit 1
        fi
        if [ "$${AVAIL_GB}" -lt "$${WARN_FREE_GB}" ]; then
          echo "WARNING: Only $${AVAIL_GB} GB free — session may be cut short. Consider freeing space."
        fi

        echo "Waiting for primary sensors..."
        for i in $$(seq 1 40); do
          if ros2 topic info /hesai_lidar/points 2>/dev/null | grep -qE "Publisher count: [1-9]"; then
            echo "  LiDAR ready ($${i}s)"; break
          fi
          if [ "$$i" -eq 40 ]; then
            echo "  WARNING: /hesai_lidar/points not available after 40s — recording anyway"
          else
            echo "  ($$i/40) Waiting for /hesai_lidar/points..."
            sleep 1
          fi
        done

        TIMESTAMP=$$(date +%Y-%m-%d_%H-%M-%S)
        # BAG_NAME uses SESSION_TYPE + EXPERIMENT_NAME (set by annotate_session.sh) + timestamp.
        # EXPERIMENT_NAME comes from demos/data_collection/.env — run annotate_session.sh first.
        BAG_NAME="mtt_$${SESSION_TYPE}_$${EXPERIMENT_NAME}_$${TIMESTAMP}"
        BAG_DIR="${WORKSPACE}/data/$${BAG_NAME}"
        BAG_SUBDIR="$${BAG_DIR}/bag"

        # Create parent dir for metadata. The bag itself goes to BAG_DIR/bag/ so that
        # ros2 bag record creates a fresh directory (it refuses to use an existing one).
        mkdir -p "$${BAG_DIR}"
        echo "  Session dir:  $${BAG_DIR}"
        echo "  Bag subdir:   $${BAG_SUBDIR}"

        # Write session metadata sidecar
        {
          printf 'experiment_name: "%s"\n' "$${EXPERIMENT_NAME}"
          printf 'session_type: "%s"\n'    "$${SESSION_TYPE}"
          printf 'terrain: "%s"\n'         "$${TERRAIN}"
          printf 'trailer_attached: %s\n'  "$${TRAILER_ATTACHED}"
          printf 'operator: "%s"\n'        "$${OPERATOR}"
          printf 'weather: "%s"\n'         "$${WEATHER}"
          printf 'temperature_c: %s\n'     "$${TEMPERATURE}"
          printf 'notes: "%s"\n'           "$${NOTES}"
          printf 'gps_mode: "%s"\n'        "$${GPS_MODE}"
          printf 'gps_antennas: "%s"\n'    "$${GPS_ANTENNAS}"
          printf 'enable_teleop: %s\n'     "$${ENABLE_TELEOP}"
          printf 'enable_joystick: %s\n'   "$${ENABLE_JOYSTICK}"
          printf 'mapping_points_topic: "%s"\n' "$${MAPPING_POINTS_TOPIC}"
          printf 'driver_params_file: "%s"\n' "$${DRIVER_PARAMS_FILE}"
          printf 'health_params_file: "%s"\n' "$${HEALTH_PARAMS_FILE}"
          printf 'control_params_file: "%s"\n' "$${CONTROL_PARAMS_FILE}"
          printf 'follower_params_file: "%s"\n' "$${FOLLOWER_PARAMS_FILE}"
          printf 'supervisor_params_file: "%s"\n' "$${SUPERVISOR_PARAMS_FILE}"
          printf 'wiln_params_file: "%s"\n' "$${WILN_PARAMS_FILE}"
          printf 'started_at: "%s"\n'      "$$(date -Iseconds)"
          printf 'robot_host: "%s"\n'      "${ROBOT_HOST:-192.168.2.2}"
          printf 'session_dir: "%s"\n'     "$${BAG_DIR}"
          printf 'bag_subdir: "%s"\n'      "$${BAG_SUBDIR}"
        } > "$${BAG_DIR}/session_info.yaml"
        echo "  Session metadata → $${BAG_DIR}/session_info.yaml"

        # ── Snapshot software version ──────────────────────────────
        GIT_HASH=$$(git -C "${WORKSPACE}" rev-parse HEAD 2>/dev/null || echo "unknown")
        GIT_BRANCH=$$(git -C "${WORKSPACE}" rev-parse --abbrev-ref HEAD 2>/dev/null || echo "unknown")
        GIT_DIRTY=$$(git -C "${WORKSPACE}" status --short 2>/dev/null | wc -l | xargs)
        {
          printf 'git_hash: "%s"\n'       "$${GIT_HASH}"
          printf 'git_branch: "%s"\n'     "$${GIT_BRANCH}"
          printf 'git_dirty_files: %s\n'  "$${GIT_DIRTY}"
        } >> "$${BAG_DIR}/session_info.yaml"
        echo "  Git:  $${GIT_BRANCH} @ $${GIT_HASH:0:8} ($${GIT_DIRTY} dirty files)"

        # ── Snapshot ROS parameters for key nodes ──────────────────
        echo "  Waiting for key nodes before param snapshot..."
        for NODE in /mtt_can_node /mtt_odometry_node /mtt_cmd_arbiter_node; do
          for i in $$(seq 1 30); do
            ros2 node list 2>/dev/null | grep -qF "$$NODE" && break
            [ "$$i" -eq 30 ] && echo "  WARNING: $$NODE not found" && break
            sleep 0.5
          done
          echo "  $$NODE ready"
        done
        PARAM_FILE="$${BAG_DIR}/ros_params.yaml"
        for NODE in /mtt_can_node /mtt_odometry_node /mtt_operator_input_node /mtt_manual_cmd_filter_node /mtt_mode_manager_node /mtt_cmd_arbiter_node; do
          echo "# --- $${NODE} ---" >> "$${PARAM_FILE}" 2>/dev/null
          ros2 param dump "$${NODE}" 2>/dev/null >> "$${PARAM_FILE}" || \
            echo "# $${NODE}: not available" >> "$${PARAM_FILE}"
        done
        echo "  ROS params → $${BAG_DIR}/ros_params.yaml"

        # ── Snapshot active topic list ──────────────────────────────
        ros2 topic list 2>/dev/null > "$${BAG_DIR}/topic_list.txt" || true
        ros2 topic list --show-types 2>/dev/null > "$${BAG_DIR}/topic_list_with_types.txt" || true
        echo "  Topics → $${BAG_DIR}/topic_list.txt"

        wait_for_topic() {
          local topic="$$1"
          local timeout_s="$$2"
          local label="$$3"
          local i
          for i in $$(seq 1 "$$timeout_s"); do
            if ros2 topic info "$$topic" 2>/dev/null | grep -qE "Publisher count: [1-9]"; then
              echo "  $$label ready ($${i}s)"
              return 0
            fi
            sleep 1
          done
          echo "  WARNING: $$label not available after $${timeout_s}s"
          return 1
        }

        echo "Waiting for latched and runtime-critical topics..."
        wait_for_topic /tf 20 "dynamic TF" || true
        wait_for_topic /tf_static 20 "static TF" || true
        wait_for_topic /robot_description 20 "robot description" || true
        wait_for_topic /joint_states 20 "joint states" || true

        echo "Checking optional camera/GPS topics before record..."
        if [ "$${ENABLE_PERCEPTION:-true}" = "true" ]; then
          wait_for_topic /zed/zed_node/rgb/color/rect/image/compressed 15 "ZED RGB" || true
          wait_for_topic /zed/zed_node/depth/depth_registered/compressedDepth 15 "ZED depth" || true
          wait_for_topic /zed/zed_node/point_cloud/cloud_registered 15 "ZED point cloud" || true
        else
          echo "  ZED skipped (ENABLE_PERCEPTION=false)"
        fi
        if [ "$${ENABLE_OAK:-true}" = "true" ]; then
          wait_for_topic /oak/rgb/image_rect 15 "OAK RGB" || true
          wait_for_topic /oak/stereo/image_raw 15 "OAK depth" || true
          wait_for_topic /oak/points 15 "OAK point cloud" || true
        else
          echo "  OAK skipped (ENABLE_OAK=false)"
        fi
        if [ "$${ENABLE_GPS:-true}" = "true" ]; then
          wait_for_topic /gps/fix 15 "GPS fix" || true
          wait_for_topic /gps/time_reference 15 "GPS time reference" || true
        else
          echo "  GPS skipped (ENABLE_GPS=false)"
        fi
        wait_for_topic /hesai_lidar/points 15 "Hesai mapper cloud" || true
        wait_for_topic /mapping/icp_odom 20 "ICP odom" || true
        wait_for_topic /mapping/map 20 "ICP map" || true
        wait_for_topic /mapping/trajectory_path 20 "ICP trajectory path" || true
        wait_for_topic /trailer/articulation_angle 15 "trailer articulation perception" || true
        wait_for_topic /trailer/pose 15 "trailer pose perception" || true

        TOPIC_CONFIG="${WORKSPACE}/src/external/norlab_robot/config/rosbag_record/all_sensors_full.yaml"
        mapfile -t RECORD_TOPICS < <(
          python3 -c 'import sys,yaml; from pathlib import Path; config=yaml.safe_load(Path(sys.argv[1]).read_text()); print("\n".join(config["topics_main"]))' "$${TOPIC_CONFIG}"
        )
        if [ "$${#RECORD_TOPICS[@]}" -eq 0 ]; then
          echo "ERROR: topic config $$TOPIC_CONFIG is empty"
          exit 1
        fi
        printf '%s\n' "$${RECORD_TOPICS[@]}" > "$${BAG_DIR}/record_topics.txt"
        echo "  Recording $${#RECORD_TOPICS[@]} configured topics"
        echo "  Topic list  → $${BAG_DIR}/record_topics.txt"

        CLEANUP_DONE=0
        BAG_PID=""
        MONITOR_PID=""
        cleanup_recording() {
          if [ "$${CLEANUP_DONE}" -eq 1 ]; then return; fi
          CLEANUP_DONE=1
          echo ""
          if [ -n "$${MONITOR_PID}" ]; then
            kill "$${MONITOR_PID}" 2>/dev/null || true
          fi
          if [ -n "$${BAG_PID}" ] && kill -0 "$${BAG_PID}" 2>/dev/null; then
            echo "  Stopping ros2 bag record (SIGINT)..."
            kill -INT "$${BAG_PID}" 2>/dev/null || true
            echo "  Waiting for recorder to finalize (max 60s)..."
            for i in $$(seq 1 60); do
              if ! kill -0 "$${BAG_PID}" 2>/dev/null; then
                echo "  Recorder process exited cleanly."
                break
              fi
              [ "$$i" -eq 60 ] && echo "  TIMEOUT: Recorder still alive — sending SIGTERM" && kill -TERM "$${BAG_PID}" 2>/dev/null
              sleep 1
            done
          fi
          # Ensure file system is flushed
          sync 2>/dev/null || true
          if [ ! -f "$${BAG_SUBDIR}/metadata.yaml" ]; then
            echo "  metadata.yaml missing — wait 5s for flush..."
            sleep 5
            if [ ! -f "$${BAG_SUBDIR}/metadata.yaml" ]; then
              echo "  Attempting ros2 bag reindex..."
              ros2 bag reindex "$${BAG_SUBDIR}" > "$${BAG_DIR}/ros2_bag_reindex.txt" 2>&1 || true
            fi
          fi
          PRIMARY_MCAP=$$(find "$${BAG_SUBDIR}" -maxdepth 1 -type f -name '*.mcap' | sort | head -n 1)
          if [ -n "$${PRIMARY_MCAP}" ]; then
            ln -sfn "$${PRIMARY_MCAP}" "$${BAG_DIR}/session.mcap"
            echo "  Primary MCAP → $${BAG_DIR}/session.mcap"
          fi
          ros2 bag info "$${BAG_SUBDIR}" > "$${BAG_DIR}/ros2_bag_info.txt" 2>&1 || true
          python3 "${WORKSPACE}/scripts/audit_bag_topics.py" "$${BAG_DIR}" --show-ok > "$${BAG_DIR}/audit_bag_topics.txt" 2>&1 || true
          python3 "${WORKSPACE}/scripts/post_session_report.py" "$${BAG_DIR}" > "$${BAG_DIR}/post_session_report.stdout" 2>&1 || true
          echo ''
          echo '  Saving Norlab ICP map and trajectory snapshots when mapper services are available.'
          ros2 service call /mapping/save_map norlab_icp_mapper_ros/srv/SaveMap "map_file_name:
            data: '$${BAG_DIR}/map.vtk'" 2>/dev/null && echo "  Map        -> $${BAG_DIR}/map.vtk" || true
          ros2 service call /mapping/save_trajectory norlab_icp_mapper_ros/srv/SaveTrajectory "trajectory_file_name:
            data: '$${BAG_DIR}/trajectory.vtk'" 2>/dev/null && echo "  Trajectory -> $${BAG_DIR}/trajectory.vtk" || true
          echo "  Session dir: $${BAG_DIR}"
        }
        trap cleanup_recording EXIT INT TERM

        # ── Record configured topics into BAG_DIR/bag/ ──────────────
        ros2 bag record \
          --node-name rosbag2_recorder \
          --disable-keyboard-controls \
          --storage mcap \
          --output "$${BAG_SUBDIR}" \
          --max-cache-size "$${BAG_CACHE_SIZE_BYTES:-268435456}" \
          --storage-config-file "${WORKSPACE}/src/external/norlab_robot/config/rosbag_record/mcap_writer_options_full.yaml" \
          --qos-profile-overrides-path "${WORKSPACE}/src/external/norlab_robot/config/rosbag_record/qos_override.yaml" \
          "$${RECORD_TOPICS[@]}" &
        BAG_PID=$$!

        # ── Background size + disk monitor ──────────────────────────
        (while true; do
          sleep 60
          SIZE=$$(du -sh "$${BAG_DIR}" 2>/dev/null | cut -f1)
          AVAIL_GB=$$(df -BG "${WORKSPACE}/data" | awk 'NR==2 {gsub("G",""); print $4}')
          echo "  [$$(date +%H:%M:%S)] Session size: $${SIZE}  |  Free: $${AVAIL_GB} GB"
          if [ "$${AVAIL_GB}" -lt 10 ]; then
            echo "  CRITICAL: Less than 10 GB free — stopping record"
            kill -INT "$${BAG_PID}" 2>/dev/null || true
            break
          fi
        done) &
        MONITOR_PID=$$!

        wait "$${BAG_PID}"
        RECORD_EXIT=$$?
        exit "$${RECORD_EXIT}"

  # ── Foxglove live visualisation ───────────────────────────────────────────
  # No profile → starts automatically with dc up (same as zenoh and robot).
  # Previously required --profile infra which meant it was never started in practice.
  foxglove:
    <<: [*dc_base]
    depends_on:
      robot_driver:
        condition: service_started
    command:
      - bash
      - -lc
      - |
        # host networking: ensure selected port is free before starting bridge
        if command -v fuser &>/dev/null; then
          fuser -k ${LOCAL_FOXGLOVE_PORT:-8765}/tcp 2>/dev/null || true
          sleep 0.5
        fi
        params_file="$${FOXGLOVE_PARAMS_FILE}"
        address_args=()
        if [ "$${FIELD_NETWORK_MODE:-false}" = "true" ]; then
          params_file="$${FOXGLOVE_FIELD_PARAMS_FILE}"
          address_args=(-p address:="$${FOXGLOVE_BIND_ADDRESS}")
          echo "FIELD_NETWORK_MODE=true: Foxglove binding $${FOXGLOVE_BIND_ADDRESS}:$${LOCAL_FOXGLOVE_PORT:-8765}"
          echo "  Params: $${params_file}"
        fi
        exec ros2 run foxglove_bridge foxglove_bridge \
          --ros-args \
          --params-file "$${params_file}" \
          -p port:=${LOCAL_FOXGLOVE_PORT:-8765} \
          "$${address_args[@]}"

  # ── Remote-safe LiDAR debug cloud ─────────────────────────────────────────
  # Publishes a small ROI/voxelized cloud for Foxglove field use. Mapping and
  # WILN still consume the raw Hesai cloud locally.
  lidar_debug_cloud:
    <<: [*dc_base]
    profiles: ["field", "debug"]
    depends_on:
      sensors:
        condition: service_started
    command:
      - python3
      - ${WORKSPACE}/scripts/pointcloud_voxel_debug.py
      - --ros-args
      - -p
      - input_topic:=${LIDAR_DEBUG_INPUT_TOPIC:-/hesai_lidar/points}
      - -p
      - output_topic:=${LIDAR_DEBUG_OUTPUT_TOPIC:-/debug/hesai_points_voxel}
      - -p
      - voxel_size:=${LIDAR_DEBUG_VOXEL_SIZE:-0.30}
      - -p
      - max_rate_hz:=${LIDAR_DEBUG_MAX_RATE_HZ:-2.0}
      - -p
      - max_points:=${LIDAR_DEBUG_MAX_POINTS:-25000}

  network_audit:
    <<: [*dc_base]
    profiles: ["check", "field", "debug"]
    command:
      - bash
      - -lc
      - |
        ${WORKSPACE}/scripts/audit_network_field.sh

  doodle_check:
    <<: [*dc_base]
    profiles: ["check", "field", "debug"]
    command:
      - bash
      - -lc
      - |
        ${WORKSPACE}/scripts/field_doodle_check.sh

  # ── LiDAR-Camera colorizer ────────────────────────────────────────────────
  # Projects ZED2i RGB onto the Hesai PointCloud2 and publishes
  # /hesai_lidar/points_colored (keeps intensity + adds rgb field).
  # Usage: dc up --profile colorizer
  colorizer:
    <<: [*dc_base]
    profiles: ["colorizer"]
    depends_on:
      sensors:
        condition: service_started
    command:
      - bash
      - -lc
      - |
        echo "Waiting for sensors to settle..."
        sleep 5
        exec ros2 launch mtt_lidar_camera_colorizer colorizer.launch.py \
          use_sim_time:=false \
          image_transport:=raw

  rviz:
    <<: [*dc_base]
    profiles: ["viz"]
    depends_on:
      robot_driver:
        condition: service_started
    command:
      - ros2
      - launch
      - mtt_bringup
      - mtt_rviz.launch.py
      - use_sim_time:=false
      - rviz_config:=${WORKSPACE}/src/mtt_core/mtt_description/rviz/urdf_config.rviz

  # ── Manual teleop ─────────────────────────────────────────────────────────
  teleop:
    <<: [*dc_base]
    profiles: ["manual"]
    depends_on:
      robot_driver:
        condition: service_started
    command:
      - bash
      - -lc
      - |
        echo "teleop service is now a compatibility stub."
        echo "Joystick teleop already runs inside the robot service."
        echo "Edit demos/data_collection/config/runtime.env and demos/common/config/mtt_control.yaml to change joystick behavior."

  # ── SocketCAN → ROS2 bridge ───────────────────────────────────────────────
  # Publishes raw CAN frames from can0 on /from_can_bus (can_msgs/Frame)
  # and forwards /to_can_bus back to the bus.
  # Requires: Dockerfile must have ros-jazzy-ros2-socketcan installed.
  # CAN interface is accessible because ros_runtime_base uses network_mode: host
  # and has CAP_NET_RAW.
  socketcan_bridge:
    <<: [*dc_base]
    depends_on:
      robot_driver:
        condition: service_started
    command:
      - bash
      - -c
      - |
        # Wait for can0 to be UP (not just present).
        # The robot service brings up can0 inside its launch — this may take a few
        # seconds after the container starts. Check "state UP", not just existence.
        for i in $$(seq 1 60); do
          ip link show can0 2>/dev/null | grep -q "state UP" && break
          echo "Waiting for can0 state UP... ($$i/60)"
          sleep 1
        done
        if ! ip link show can0 2>/dev/null | grep -q "state UP"; then
          echo "ERROR: can0 never reached state UP — socketcan_bridge will not start"
          exit 1
        fi
        echo "can0 is UP — starting socketcan bridge"
        exec ros2 launch ros2_socketcan socket_can_bridge.launch.xml \
          interface:=can0 \
          receiver_interval_sec:=0.1

  # ── WILN teach-and-repeat ────────────────────────────────────────────────
  # Launches the WILN navigation node + odom-to-pose converter.
  # Requires ICP mapping to be running (enable_mapping:=true on the robot service).
  #
  # Workflow:
  #   dc up --profile wiln              — start WILN node (keep running)
  #   dc run --rm wiln_teach_start      — begin recording a new route
  #   dc run --rm wiln_teach_stop       — stop recording
  #   dc run --rm wiln_save             — save route to ${WILN_LTR_DIR}/route.ltr
  #   dc run --rm wiln_load             — load route from ${WILN_LTR_DIR}/route.ltr
  #   dc run --rm wiln_replay           — start autonomous repeat
  #   dc run --rm wiln_replay_stop      — cancel current replay
  #   dc run -e N=3 --rm wiln_replay_loop — repeat N times (default 1)
  wiln:
    <<: [*dc_base]
    profiles: ["wiln"]
    depends_on:
      mapping:
        condition: service_started
    command:
      - bash
      - -lc
      - |
        eval "$$($${WORKSPACE}/scripts/wiln_route_env.sh --mode load)"
        wait_for_topic() {
          topic="$$1"; timeout_s="$$2"; label="$$3"
          echo "Waiting for $$label ($$topic)..."
          for i in $$(seq 1 "$$timeout_s"); do
            ros2 topic info "$$topic" 2>/dev/null | grep -qE "Publisher count: [1-9]" && return 0
            sleep 1
          done
          echo "ERROR: $$label ($$topic) not available after $${timeout_s}s"
          return 1
        }
        wait_for_topic /mapping/icp_odom 45 "Norlab ICP odom" || exit 1
        wait_for_topic /mapping/map 45 "Norlab ICP map" || exit 1
        wait_for_topic /mapping/trajectory_path 45 "Norlab ICP trajectory path" || exit 1
        echo "Norlab ICP ready — starting teach/repeat stack"
        echo ""
        echo "  Fresh route:"
        echo "    dc run --rm wiln_teach_start     — start teaching"
        echo "    ... drive manually ..."
        echo "    dc run --rm wiln_teach_stop      — stop teaching, route armed in memory"
        echo "    dc run --rm route_replay         — replay through route safety checks"
        echo "    dc run --rm wiln_save            — optional, save to $${WILN_LTR_DIR}/route.ltr"
        echo "    dc run --rm route_check          — validate + preview saved route"
        echo ""
        echo "  Existing route:"
        echo "    dc run --rm wiln_load            — load from $${WILN_LTR_DIR}/route.ltr"
        echo "    dc run --rm route_replay         — replay loaded route"
        echo ""
        echo "  Diagnostics:"
        echo "    dc run --rm wiln_status"
        echo "    dc run --rm wiln_replay_stop"
        echo ""
        echo "  Note:"
        echo "    Do not use 'ros2 launch wiln' directly for MTT."
        echo "    This service already launches the full MTT teach/repeat stack."
        echo ""
        echo "  WILN cfg:           $${WILN_PARAMS_FILE}"
        echo "  Follower cfg:       $${FOLLOWER_PARAMS_FILE}"
        echo "  Supervisor cfg:     $${SUPERVISOR_PARAMS_FILE}"
        echo "  Route manager cfg:  $${ROUTE_MANAGER_PARAMS_FILE}"
        echo "  Front obstacle cfg: $${FRONT_OBSTACLE_PARAMS_FILE}"
        echo ""
        exec ros2 launch norlab_robot teach_repeat.launch.py \
          use_sim_time:=false \
          wiln_params_file:=$${WILN_PARAMS_FILE} \
          follower_params_file:=$${FOLLOWER_PARAMS_FILE} \
          supervisor_params_file:=$${SUPERVISOR_PARAMS_FILE} \
          route_manager_params_file:=$${ROUTE_MANAGER_PARAMS_FILE} \
          front_obstacle_params_file:=$${FRONT_OBSTACLE_PARAMS_FILE}

  # ── WILN control (one-shot) ──────────────────────────────────────────────
  # Run with:  dc run --rm wiln_teach_start
  # Profiles prevent accidental start on dc up; dc run ignores profiles.
  # All services share the same Zenoh ROS2 network (network_mode: host).

  wiln_teach_start:
    <<: [*dc_base]
    profiles: ["wiln-ctrl"]
    command:
      - ros2
      - service
      - call
      - /mtt_repeat/teach_start
      - std_srvs/srv/Trigger
      - "{}"

  wiln_teach_stop:
    <<: [*dc_base]
    profiles: ["wiln-ctrl"]
    command:
      - ros2
      - service
      - call
      - /mtt_repeat/teach_stop
      - std_srvs/srv/Trigger
      - "{}"

  wiln_save:
    <<: [*dc_base]
    profiles: ["wiln-ctrl"]
    command:
      - bash
      - -lc
      - |
        eval "$$($${WORKSPACE}/scripts/wiln_route_env.sh --mode save --create-dir --update-latest)"
        # 11C: Wait for /wiln/trajectory before saving — avoids race when wiln_save is
        # called immediately after wiln_teach_stop. The teach node publishes the trajectory
        # on stop; transient_local QoS ensures late subscribers receive it, but there is a
        # brief DDS propagation window. Timeout 5s covers normal startup delays.
        echo "Waiting for trajectory on /wiln/trajectory..."
        timeout 5 ros2 topic echo --once /wiln/trajectory > /dev/null 2>&1 || {
          echo "ERROR: No trajectory available after 5s. Did you run wiln_teach_stop first?"
          exit 1
        }
        echo "Saving route '$${ROUTE_NAME}' -> $${ROUTE_FILE}"
        ros2 topic pub --once /wiln/command std_msgs/msg/String "{data: 'save:$${ROUTE_FILE}'}"

  wiln_load:
    <<: [*dc_base]
    profiles: ["wiln-ctrl"]
    command:
      - bash
      - -lc
      - |
        eval "$$($${WORKSPACE}/scripts/wiln_route_env.sh --mode load)"
        echo "Loading route '$${ROUTE_NAME}' -> $${ROUTE_FILE}"
        ros2 topic pub --once /wiln/command std_msgs/msg/String "{data: 'load:$${ROUTE_FILE}'}"
        ros2 service call /mtt_repeat/mark_ready std_srvs/srv/Trigger "{}"

  wiln_validate:
    <<: [*dc_base]
    profiles: ["wiln-ctrl"]
    command:
      - bash
      - -lc
      - |
        eval "$$($${WORKSPACE}/scripts/wiln_route_env.sh --mode load)"
        python3 ${WORKSPACE}/scripts/validate_wiln_route.py "$${ROUTE_FILE}"

  wiln_replay:
    <<: [*dc_base]
    profiles: ["wiln-ctrl"]
    command:
      - ros2
      - service
      - call
      - /mtt_repeat/play_line
      - std_srvs/srv/Trigger
      - "{}"

  wiln_replay_stop:
    <<: [*dc_base]
    profiles: ["wiln-ctrl"]
    command:
      - ros2
      - service
      - call
      - /mtt_repeat/cancel
      - std_srvs/srv/Trigger
      - "{}"

  wiln_replay_loop:
    <<: [*dc_base]
    profiles: ["wiln-ctrl"]
    command:
      - bash
      - -lc
      - |
        ros2 service call /mtt_repeat/play_loop std_srvs/srv/Trigger "{}"

  icp_check:
    <<: [*dc_base]
    profiles: ["wiln-ctrl"]
    command:
      - python3
      - ${WORKSPACE}/scripts/check_icp_odom.py
      - --duration
      - ${ICP_CHECK_DURATION:-8}

  field_ready:
    <<: [*dc_base]
    profiles: ["wiln-ctrl"]
    command:
      - python3
      - ${WORKSPACE}/scripts/field_ready_check.py
      - --icp-duration
      - ${ICP_CHECK_DURATION:-6}

  icp_health:
    <<: [*dc_base]
    profiles: ["wiln-ctrl"]
    command:
      - python3
      - ${WORKSPACE}/scripts/audit_icp_health.py

  wiln_status:
    <<: [*dc_base]
    profiles: ["wiln-ctrl"]
    command:
      - bash
      - -lc
      - |
        green='\033[0;32m'; red='\033[0;31m'; yellow='\033[1;33m'; bold='\033[1m'; reset='\033[0m'
        ok(){ echo -e "  $${green}✓$${reset} $$1"; }
        bad(){ echo -e "  $${red}✗$${reset} $$1"; }
        warn(){ echo -e "  $${yellow}⚠$${reset} $$1"; }
        has_topic(){ ros2 topic list 2>/dev/null | grep -qx "$$1"; }
        has_service(){ ros2 service list 2>/dev/null | grep -qx "$$1"; }
        echo -e "$${bold}== WILN / Repeat Status ==$${reset}"
        echo ""
        echo -e "$${bold}Stack$${reset}"
        has_topic /wiln/command && ok "/wiln/command ready" || bad "/wiln/command missing — wiln container probably crashed; run: docker compose logs --tail=200 wiln"
        for topic in /wiln/teach/state /wiln/route/state /wiln/replay/state /wiln/follower/state /wiln/trajectory /wiln/global_plan /wiln/control/local_plan; do
          has_topic "$$topic" && ok "$$topic" || warn "$$topic missing"
        done
        echo ""
        echo -e "$${bold}MTT repeat services$${reset}"
        for svc in /mtt_repeat/teach_start /mtt_repeat/teach_stop /mtt_repeat/play_line /mtt_repeat/play_loop /mtt_repeat/cancel /mtt_repeat/mark_ready; do
          has_service "$$svc" && ok "$$svc" || bad "$$svc missing"
        done
        echo ""
        echo -e "$${bold}Control mode / buttons$${reset}"
        printf "  selected_mode: "; timeout 2s ros2 topic echo --once /mtt_control/selected_mode --field data 2>/dev/null || echo "missing (mode manager not publishing)"
        printf "  auto_enabled:  "; timeout 2s ros2 topic echo --once /mtt_control/auto_mode_enabled --field data 2>/dev/null || echo "missing"
        printf "  selected_src:  "; timeout 2s ros2 topic echo --once /mtt_control/selected_source --field data 2>/dev/null || echo "missing"
        printf "  deadman:       "; timeout 2s ros2 topic echo --once /mtt_control/teleop_deadman --field data 2>/dev/null || echo "missing (normal if no joystick/deadman pressed)"
        echo "  buttons: A=auto, B=stop, Y=manual, RB=deadman"
        echo ""
        echo -e "$${bold}Repeat command flow$${reset}"
        for topic in /wiln/trajectory /wiln/control/local_plan /controller/cmd_vel /cmd_vel; do
          if has_topic "$$topic"; then
            ok "$$topic"
            timeout 2s ros2 topic hz "$$topic" 2>/dev/null | sed -n '1,2p' | sed 's/^/    /' || true
          else
            warn "$$topic missing"
          fi
        done
        echo ""
        echo -e "$${bold}Safety / odometry$${reset}"
        has_topic /mapping/icp_odom && ok "/mapping/icp_odom" || bad "/mapping/icp_odom missing"
        has_topic /mapping/map && ok "/mapping/map" || warn "/mapping/map missing"
        has_topic /mapping/trajectory_path && ok "/mapping/trajectory_path" || warn "/mapping/trajectory_path missing"
        has_topic /mapping/aligned_scan && ok "/mapping/aligned_scan" || warn "/mapping/aligned_scan missing"
        has_topic /mtt_health && ok "/mtt_health" || bad "/mtt_health missing"
        has_topic /hesai_lidar/points && ok "/hesai_lidar/points" || bad "/hesai_lidar/points missing — front obstacle stop cannot work"
        has_topic /mtt_obstacle/hazard_status && ok "/mtt_obstacle/hazard_status" || warn "/mtt_obstacle/hazard_status missing — WILN/front obstacle monitor not running"
        printf "  front obstacle: "; timeout 2s ros2 topic echo --once /mtt_obstacle/hazard_status --field data 2>/dev/null || echo "unavailable"
        printf "  front clearance:"; timeout 2s ros2 topic echo --once /mtt_obstacle/front_clearance_m --field data 2>/dev/null || echo " unavailable"
        printf "  front stop:     "; timeout 2s ros2 topic echo --once /mtt_obstacle/stop_requested --field data 2>/dev/null || echo "unavailable"
        printf "  slowdown scale: "; timeout 2s ros2 topic echo --once /mtt_obstacle/slowdown_scale --field data 2>/dev/null || echo "unavailable"
        echo "  quick ICP check: docker compose run --rm icp_check"
        printf "  health:        "; timeout 2s ros2 topic echo --once /mtt_health 2>/dev/null | sed -n '1,12p' || echo "unavailable"
        echo ""
        echo -e "$${bold}Repeat state$${reset}"
        timeout 2s ros2 topic echo --once /mtt_repeat/state 2>/dev/null || echo "  /mtt_repeat/state unavailable"
        timeout 2s ros2 topic echo --once /mtt_repeat/ready 2>/dev/null || echo "  /mtt_repeat/ready unavailable"
        echo ""
        echo -e "$${bold}Route manager$${reset}"
        timeout 4s ros2 service call /mtt_route/status mtt_interfaces/srv/RouteStatus "{}" 2>/dev/null || echo "  /mtt_route/status unavailable"
        timeout 2s ros2 topic echo --once /mtt_route/status_text 2>/dev/null || true
        echo ""
        echo -e "$${bold}Debug hint$${reset}"
        echo "  If mode is not auto, press A or use route_replay (it requests auto)."
        echo "  If selected_src is AUTO_WAIT, WILN is not publishing /controller/cmd_vel yet."
        echo "  If /wiln/control/local_plan is missing during replay, route is not loaded/playing."
        echo "  If ICP check fails, do not repeat; fix mapper/TF/cloud first."
        echo "  If /wiln/command is missing, inspect: docker compose logs --tail=200 wiln"

  route_list:
    <<: [*dc_base]
    profiles: ["wiln-ctrl"]
    command:
      - ros2
      - service
      - call
      - /mtt_route/list
      - mtt_interfaces/srv/RouteList
      - "{}"

  route_validate:
    <<: [*dc_base]
    profiles: ["wiln-ctrl"]
    command:
      - bash
      - -lc
      - |
        eval "$$($${WORKSPACE}/scripts/wiln_route_env.sh --mode load)"
        ros2 service call /mtt_route/validate mtt_interfaces/srv/RouteCommand "{route_name: \"$${ROUTE_NAME}\"}"

  route_preview:
    <<: [*dc_base]
    profiles: ["wiln-ctrl"]
    command:
      - bash
      - -lc
      - |
        eval "$$($${WORKSPACE}/scripts/wiln_route_env.sh --mode load)"
        MPLCONFIGDIR=/tmp/matplotlib python3 ${WORKSPACE}/scripts/preview_wiln_route.py "$${ROUTE_FILE}" --output-dir "$${WILN_LTR_DIR}"
        PREVIEW_RC=$$?
        if [ "$${PREVIEW_RC}" -ne 0 ] && [ "$${PREVIEW_RC}" -ne 2 ]; then exit "$${PREVIEW_RC}"; fi
        ros2 service call /mtt_route/preview mtt_interfaces/srv/RouteCommand "{route_name: \"$${ROUTE_NAME}\"}"

  route_check:
    <<: [*dc_base]
    profiles: ["wiln-ctrl"]
    command:
      - bash
      - -lc
      - |
        ${WORKSPACE}/scripts/route_field_check.sh

  route_load:
    <<: [*dc_base]
    profiles: ["wiln-ctrl"]
    command:
      - bash
      - -lc
      - |
        eval "$$($${WORKSPACE}/scripts/wiln_route_env.sh --mode load)"
        ros2 service call /mtt_route/load mtt_interfaces/srv/RouteCommand "{route_name: \"$${ROUTE_NAME}\"}"

  route_replay:
    <<: [*dc_base]
    profiles: ["wiln-ctrl"]
    command:
      - bash
      - -lc
      - |
        eval "$$($${WORKSPACE}/scripts/wiln_route_env.sh --mode load)"
        ros2 service call /mtt_route/replay mtt_interfaces/srv/RouteCommand "{route_name: \"$${ROUTE_NAME}\"}"

  route_stop:
    <<: [*dc_base]
    profiles: ["wiln-ctrl"]
    command:
      - ros2
      - service
      - call
      - /mtt_route/stop
      - std_srvs/srv/Trigger
      - "{}"

  route_status:
    <<: [*dc_base]
    profiles: ["wiln-ctrl"]
    command:
      - ros2
      - service
      - call
      - /mtt_route/status
      - mtt_interfaces/srv/RouteStatus
      - "{}"


  # ── Live diagnostic tools ─────────────────────────────────────────────────
  # Run any of these while the robot service is up to inspect live state.
  # Usage: docker compose run --rm audit_topics
  #        docker compose run --rm audit_tf
  #        docker compose run --rm route_start_check
  #        docker compose run --rm map_quality

  audit_topics:
    <<: [*dc_base]
    profiles: ["wiln-ctrl"]
    command:
      - python3
      - ${WORKSPACE}/scripts/audit_live_topics.py
      - --duration
      - ${AUDIT_DURATION:-30}

  audit_tf:
    <<: [*dc_base]
    profiles: ["wiln-ctrl"]
    command:
      - python3
      - ${WORKSPACE}/scripts/audit_tf_chain.py
      - --duration
      - ${AUDIT_DURATION:-60}

  route_start_check:
    <<: [*dc_base]
    profiles: ["wiln-ctrl"]
    command:
      - bash
      - -lc
      - |
        eval "$$($${WORKSPACE}/scripts/wiln_route_env.sh --mode load)"
        python3 ${WORKSPACE}/scripts/route_start_check.py --route "$${ROUTE_FILE}"

  route_align:
    <<: [*dc_base]
    profiles: ["wiln-ctrl"]
    command:
      - bash
      - -lc
      - |
        eval "$$($${WORKSPACE}/scripts/wiln_route_env.sh --mode load)"
        python3 ${WORKSPACE}/scripts/align_route_to_pose.py --route "$${ROUTE_FILE}"

  map_quality:
    <<: [*dc_base]
    profiles: ["wiln-ctrl"]
    command:
      - python3
      - ${WORKSPACE}/scripts/icp_map_quality_check.py
      - --duration
      - ${AUDIT_DURATION:-120}

  # ── ICP map + trajectory saver (one-shot) ────────────────────────────────
  # Manually save the current map and trajectory at any time during a session.
  # Usage:  dc run --rm -e OUT_DIR=${WORKSPACE}/data/my_session map_saver
  # Default output: ${WORKSPACE}/data/map_<timestamp>.vtk + trajectory_<timestamp>.vtk
  map_saver:
    <<: [*dc_base]
    profiles: ["save"]
    depends_on:
      mapping:
        condition: service_started
    environment:
      OUT_DIR: ${OUT_DIR:-${WORKSPACE}/data}
    command:
      - bash
      - -lc
      - |
        TS=$$(date +%Y-%m-%d_%H-%M-%S)
        MAP_FILE="$${OUT_DIR}/map_$${TS}.vtk"
        TRAJ_FILE="$${OUT_DIR}/trajectory_$${TS}.vtk"
        mkdir -p "$${OUT_DIR}"
        echo "Saving ICP map → $${MAP_FILE}"
        ros2 service call /mapping/save_map \
          norlab_icp_mapper_ros/srv/SaveMap \
          "{map_file_name: {data: \"$${MAP_FILE}\"}}"
        echo "Saving trajectory → $${TRAJ_FILE}"
        ros2 service call /mapping/save_trajectory \
          norlab_icp_mapper_ros/srv/SaveTrajectory \
          "{trajectory_file_name: {data: \"$${TRAJ_FILE}\"}}"
        echo "Done."

  # ── Debug shell ───────────────────────────────────────────────────────────
  bash:
    <<: [*dc_base]
    profiles: ["debug"]
    tty: true
    stdin_open: true
    command: bash
