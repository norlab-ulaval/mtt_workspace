services:
  bash:
    extends:
      file: ../../compose.yaml
      service: bash
    profiles: ["manual"]

  simulation:
    extends:
      file: ../../compose.yaml
      service: bash
    command: ros2 launch mtt_bringup mtt_simulation.launch.py use_rviz:=False

  rviz:
    extends:
      file: ../../compose.yaml
      service: bash
    command: ros2 launch mtt_bringup mtt_rviz.launch.py use_sim_time:=True rviz_config:=${WORKSPACE}/src/mtt_core/mtt_description/rviz/urdf_config.rviz

  monitor:
    extends:
      file: ../../compose.yaml
      service: bash
    profiles: ["infra"]
    command: ros2 run foxglove_bridge foxglove_bridge --ros-args -p port:=${LOCAL_FOXGLOVE_PORT:-8766}
