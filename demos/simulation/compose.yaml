x-sim-base: &sim_base
  extends:
    file: ../../compose.yaml
    service: bash

services:
  bash:
    <<: [*sim_base]
    profiles: ["debug"]

  simulation:
    <<: [*sim_base]
    command:
      - bash
      - -lc
      - |
        source /opt/ros/${ROS_DISTRO:-jazzy}/setup.bash
        source ${WORKSPACE}/install/local_setup.bash
        ros2 launch mtt_bringup mtt_simulation.launch.py \
          use_rviz:=${SIM_USE_RVIZ:-false} \
          headless:=${SIM_HEADLESS:-true} \
          enable_operator_control:=${SIM_ENABLE_OPERATOR_CONTROL:-false} \
          enable_joystick:=${SIM_ENABLE_JOYSTICK:-false} \
          joy_device:=${SIM_JOY_DEVICE:-/dev/input/js0}

  control:
    <<: [*sim_base]
    depends_on:
      - simulation
    command:
      - bash
      - -lc
      - |
        source /opt/ros/${ROS_DISTRO:-jazzy}/setup.bash
        source ${WORKSPACE}/install/local_setup.bash
        ros2 launch mtt_control operator_control.launch.py \
          use_sim_time:=true \
          enable_joystick:=${SIM_CONTROL_ENABLE_JOYSTICK:-true} \
          joy_device:=${SIM_JOY_DEVICE:-/dev/input/js0} \
          joy_deadzone:=${SIM_JOY_DEADZONE:-0.15}

  rviz:
    <<: [*sim_base]
    depends_on:
      - simulation
    command:
      - bash
      - -lc
      - |
        sleep 3
        source /opt/ros/${ROS_DISTRO:-jazzy}/setup.bash
        source ${WORKSPACE}/install/local_setup.bash
        ros2 launch mtt_bringup mtt_rviz.launch.py \
          use_sim_time:=true \
          rviz_config:=${SIM_RVIZ_CONFIG:-${WORKSPACE}/src/mtt_core/mtt_description/rviz/urdf_config.rviz}

  foxglove:
    extends:
      file: ../../compose.yaml
      service: monitor
