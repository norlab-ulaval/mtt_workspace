/**:
  mtt_path_follower:
    ros__parameters:
      action_name: /follow_path
      # In simulation this must be Gazebo ground truth, not /mtt_odometry.
      # /mtt_odometry is the command/tachometer model estimate and is used for
      # validation plots; if the follower uses it, it can "finish" while Gazebo
      # barely moved.
      odom_topic: /mtt_odometry/ground_truth
      cmd_vel_topic: controller/cmd_vel
      local_plan_topic: /sim_motion_model/disabled_local_plan
      control_rate_hz: 20.0
      default_speed_ms: 1.00
      max_speed_ms: 4.20
      min_speed_ms: 0.35
      slowdown_alpha: 2.4
      k_y: 0.32
      k_theta: 0.85
      l_eq_m: 2.40
      psi_max_rad: 1.0471975512
      psi_dot_max_rad_s: 0.55
      kappa_max: 0.55
      advance_distance_m: 0.85
      waypoint_tolerance_m: 0.55
      final_heading_tolerance_rad: 0.45
      odom_timeout_s: 2.5
      max_start_distance_m: 8.0
      max_lateral_error_m: 3.00
      max_heading_error_rad: 1.45
      max_target_distance_m: 8.0
      tracking_error_grace_s: 3.0
      model_use_slip_heuristic: true
      model_yaw_slip_base: 0.10
      model_yaw_slip_speed_gain: 0.05
      model_yaw_slip_articulation_gain: 0.15
      model_yaw_slip_min_scale: 0.55
      use_path_curvature_feedforward: true
      use_adaptive_curvature_bias: false
      adaptive_kappa_i_gain: 0.015
      adaptive_kappa_decay: 0.08
      adaptive_kappa_deadband_m: 0.05
      adaptive_kappa_bias_limit: 0.08
      use_articulation_servo: false
      use_speed_servo: false
