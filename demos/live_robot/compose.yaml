x-build: &mtt_devel_build
  context: ../..
  dockerfile: docker/Dockerfile
  target: devel
  args:
    ROS_DISTRO: ${ROS_DISTRO:-jazzy}
    RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}
    USERNAME: mtt
    USER_UID: ${UID:-1000}
    USER_GID: ${GID:-1000}

x-live-robot-base: &live_robot_base
  extends:
    file: ../../docker/common.yaml
    service: ros_runtime_base
  image: ${MTT_IMAGE:-mtt_workspace:devel}
  build: *mtt_devel_build
  privileged: true
  environment:
    ROS_DOMAIN_ID: ${LIVE_ROBOT_DOMAIN_ID:-2}
    RMW_IMPLEMENTATION: rmw_zenoh_cpp
    ROBOT_NAME: ${ROBOT_NAME:-mtt-hl}
    NORLAB_ROBOT_PATH: ${WORKSPACE}/src/external/norlab_robot
    ZENOH_ROUTER_CONFIG_URI: ${WORKSPACE}/src/external/norlab_robot/scripts/config/zenoh_router.json5
    ZENOH_SESSION_CONFIG_URI: ${WORKSPACE}/src/external/norlab_robot/scripts/config/zenoh_session.json5
    RMW_ZENOH_CONFIG_FILE: ${WORKSPACE}/src/external/norlab_robot/scripts/config/zenoh_session.json5
    RUST_LOG: ${ZENOH_RUST_LOG:-zenoh=info,zenoh_transport=warn}
  volumes:
    - /dev:/dev
    - /run/udev:/run/udev:ro
    # ZED calibration files persist across container restarts.
    # The ZED SDK downloads the calibration file on first run (requires internet).
    # Without this mount the settings dir inside the container is always empty.
    - /usr/local/zed/settings:/usr/local/zed/settings:rw

services:
  bash:
    <<: [*live_robot_base]
    profiles: ["debug"]
    tty: true
    stdin_open: true
    command: bash

  zenoh:
    <<: [*live_robot_base]
    profiles: ["infra"]
    command:
      - bash
      - -c
      - |
        fuser -k 7447/tcp 2>/dev/null || true
        sleep 0.5
        exec ros2 run rmw_zenoh_cpp rmw_zenohd

  robot:
    <<: [*live_robot_base]
    privileged: true
    volumes:
      - /dev:/dev
      - /run/udev:/run/udev:ro
      - /usr/local/zed/settings:/usr/local/zed/settings:rw
      - /dev/bus/usb:/dev/bus/usb
    command:
      - ros2
      - launch
      - norlab_robot
      - live_robot.launch.py
      - warnings:=false
      - enable_mapping:=true
      - enable_teleop:=false
      - enable_joystick:=false
      - setup_real_can:=true

  foxglove:
    <<: [*live_robot_base]
    profiles: ["infra"]
    depends_on:
      - robot
    # network_mode: host (inherited) means the bridge binds on the robot host.
    # Keep this service opt-in so the default stack can reuse an existing host bridge.
    command:
      - bash
      - -lc
      - |
        if command -v fuser &>/dev/null; then
          fuser -k 8765/tcp 2>/dev/null || true
          sleep 0.5
        fi
        exec ros2 run foxglove_bridge foxglove_bridge \
          --ros-args --params-file \
          ${WORKSPACE}/src/external/norlab_robot/config/_foxglove_bridge.yaml

  teleop_robot:
    <<: [*live_robot_base]
    profiles: ["manual"]
    depends_on:
      - robot
    volumes:
      - /dev:/dev
      - /run/udev:/run/udev:ro
      - /dev/input:/dev/input  # joystick devices
    command:
      - ros2
      - launch
      - mtt_driver
      - mtt_operator_teleop.launch.py
      - joy_device:=/dev/input/js0
      - max_linear_speed:=0.6    # m/s  — full stick = this speed
      - max_angular_speed:=0.6   # rad/s — full stick = this angular rate
