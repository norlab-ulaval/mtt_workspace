# Directory can be relative to the workspace root or absolute.
# The record helper will create: <directory>/<demo_name>/<timestamp>/
name: live_robot
directory: data/records
config: true
vcs: true
remote_snapshot: true
storage: mcap
# Keep the cache large enough for throughput, but not so large that shutdown
# takes minutes and invites a second Ctrl-C / forced kill.
max_cache_size: 1073741824
storage_config: src/external/norlab_robot/config/rosbag_record/mcap_writer_options_full.yaml
qos_override: src/external/norlab_robot/config/rosbag_record/qos_override.yaml
topics_file: src/external/norlab_robot/config/rosbag_record/all_sensors_full.yaml
topics_key: topics_main
