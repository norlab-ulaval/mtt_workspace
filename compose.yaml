x-build: &mtt_devel_build
  context: .
  dockerfile: docker/Dockerfile
  target: devel
  args:
    BASE_IMAGE: ${MTT_BASE_IMAGE:-mtt_workspace:base}
    ROS_DISTRO: ${ROS_DISTRO:-jazzy}
    RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}
    USERNAME: mtt
    USER_UID: ${UID:-1000}
    USER_GID: ${GID:-1000}

services:
  bash:
    extends:
      file: docker/common.yaml
      service: x11_base
    image: ${MTT_IMAGE:-mtt_workspace:devel}
    build: *mtt_devel_build
    tty: true
    stdin_open: true
    command: bash
    volumes:
      - ${HOME}/.ssh:/home/mtt/.ssh:ro

  dev:
    extends:
      service: bash
    command: zsh

  build:
    extends:
      file: docker/common.yaml
      service: base
    image: ${MTT_IMAGE:-mtt_workspace:devel}
    build: *mtt_devel_build
    command:
      - bash
      - -lc
      - |
        mapfile -t workspace_paths < <(bash ./scripts/workspace_source_paths)
        colcon build \
          --base-paths "$${workspace_paths[@]}" \
          --symlink-install \
          --cmake-args \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
          --parallel-workers $$(nproc)
    environment:
      - CCACHE_DIR=${WORKSPACE:-/workspaces/mtt_workspace}/.ccache
    volumes:
      - ${HOME}/.ssh:/home/mtt/.ssh:ro

  compile:
    extends:
      service: build

  monitor:
    extends:
      file: docker/common.yaml
      service: ros_runtime_base
    image: ${MTT_IMAGE:-mtt_workspace:devel}
    build: *mtt_devel_build
    command:
      - ros2
      - run
      - foxglove_bridge
      - foxglove_bridge
      - --ros-args
      - --params-file
      - ${WORKSPACE}/docker/foxglove_bridge.yaml

  foxglove:
    extends:
      service: monitor

  simulation:
    extends:
      file: docker/common.yaml
      service: x11_base
    image: ${MTT_IMAGE:-mtt_workspace:devel}
    build: *mtt_devel_build
    tty: true
    stdin_open: true
    command:
      - bash
      - -lc
      - |
        source /opt/ros/${ROS_DISTRO:-jazzy}/setup.bash
        source ${WORKSPACE}/install/local_setup.bash
        ros2 launch mtt_bringup mtt_simulation.launch.py \
          use_rviz:=${SIM_USE_RVIZ:-false} \
          headless:=${SIM_HEADLESS:-true} \
          enable_operator_control:=${SIM_ENABLE_OPERATOR_CONTROL:-false} \
          enable_joystick:=${SIM_ENABLE_JOYSTICK:-false} \
          joy_device:=${SIM_JOY_DEVICE:-/dev/input/js0}

  simulation_rviz:
    extends:
      file: docker/common.yaml
      service: x11_base
    image: ${MTT_IMAGE:-mtt_workspace:devel}
    build: *mtt_devel_build
    tty: true
    stdin_open: true
    depends_on:
      - simulation
    command:
      - bash
      - -lc
      - |
        sleep 3
        source /opt/ros/${ROS_DISTRO:-jazzy}/setup.bash
        source ${WORKSPACE}/install/local_setup.bash
        ros2 launch mtt_bringup mtt_rviz.launch.py \
          use_sim_time:=true \
          rviz_config:=${SIM_RVIZ_CONFIG:-${WORKSPACE}/src/mtt_core/mtt_description/rviz/urdf_config.rviz}

  simulation_control:
    extends:
      file: docker/common.yaml
      service: x11_base
    image: ${MTT_IMAGE:-mtt_workspace:devel}
    build: *mtt_devel_build
    tty: true
    stdin_open: true
    depends_on:
      - simulation
    command:
      - bash
      - -lc
      - |
        source /opt/ros/${ROS_DISTRO:-jazzy}/setup.bash
        source ${WORKSPACE}/install/local_setup.bash
        ros2 launch mtt_control operator_control.launch.py \
          use_sim_time:=true \
          enable_joystick:=${SIM_CONTROL_ENABLE_JOYSTICK:-true} \
          joy_device:=${SIM_JOY_DEVICE:-/dev/input/js0} \
          joy_deadzone:=${SIM_JOY_DEADZONE:-0.15}
