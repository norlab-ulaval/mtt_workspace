x-build: &mtt_devel_build
  context: .
  dockerfile: docker/Dockerfile
  target: devel
  args:
    ROS_DISTRO: ${ROS_DISTRO:-jazzy}
    RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}
    USERNAME: mtt
    USER_UID: ${UID:-1000}
    USER_GID: ${GID:-1000}

services:
  bash:
    extends:
      file: docker/common.yaml
      service: x11_base
    image: ${MTT_IMAGE:-mtt_tools:devel}
    build: *mtt_devel_build
    tty: true
    stdin_open: true
    command: bash
    volumes:
      - ${HOME}/.ssh:/home/mtt/.ssh:ro

  dev:
    extends:
      service: bash
    command: zsh

  build:
    extends:
      file: docker/common.yaml
      service: base
    image: ${MTT_IMAGE:-mtt_tools:devel}
    build: *mtt_devel_build
    command:
      - bash
      - -lc
      - |
        mapfile -t workspace_paths < <(bash ./scripts/workspace_source_paths)
        colcon build --base-paths "$${workspace_paths[@]}" --symlink-install
    volumes:
      - ${HOME}/.ssh:/home/mtt/.ssh:ro

  compile:
    extends:
      service: build

  monitor:
    extends:
      file: docker/common.yaml
      service: ros_runtime_base
    image: ${MTT_IMAGE:-mtt_tools:devel}
    build: *mtt_devel_build
    command:
      - ros2
      - run
      - foxglove_bridge
      - foxglove_bridge
      - --ros-args
      - --params-file
      - ${WORKSPACE}/docker/foxglove_bridge.yaml
