x-base-build: &mtt_base_build
  context: .
  dockerfile: docker/Dockerfile.base
  args:
    ROS_DISTRO: ${ROS_DISTRO:-jazzy}
    RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}
    USERNAME: mtt
    USER_UID: ${UID:-1000}
    USER_GID: ${GID:-1000}

x-build: &mtt_devel_build
  context: .
  dockerfile: docker/Dockerfile
  target: devel
  additional_contexts:
    mtt_base: service:base
  args:
    BASE_IMAGE: ${MTT_BASE_IMAGE:-mtt_base}
    ROS_DISTRO: ${ROS_DISTRO:-jazzy}
    RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}
    USERNAME: mtt
    USER_UID: ${UID:-1000}
    USER_GID: ${GID:-1000}

services:
  # Heavy base image used by docker/Dockerfile. The devel build references this
  # service through BuildKit additional_contexts, so `compile` builds it first
  # when the local image is missing.
  base:
    image: ${MTT_BASE_IMAGE:-mtt_workspace:base}
    build: *mtt_base_build
    pull_policy: never

  bash:
    extends:
      file: docker/common.yaml
      service: x11_base
    image: ${MTT_IMAGE:-mtt_workspace:devel}
    build: *mtt_devel_build
    pull_policy: never
    tty: true
    stdin_open: true
    command: bash
    volumes:
      - ${HOME}/.ssh:/home/mtt/.ssh:ro

  dev:
    extends:
      service: bash
    command: zsh

  build:
    extends:
      file: docker/common.yaml
      service: base
    image: ${MTT_IMAGE:-mtt_workspace:devel}
    build: *mtt_devel_build
    pull_policy: never
    command:
      - bash
      - -lc
      - |
        mapfile -t workspace_paths < <(bash ./scripts/workspace_source_paths)
        colcon build \
          --base-paths "$${workspace_paths[@]}" \
          --cmake-args \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
          --parallel-workers $$(nproc)
    environment:
      - CCACHE_DIR=${WORKSPACE:-/workspaces/mtt_workspace}/.ccache
    volumes:
      - ${HOME}/.ssh:/home/mtt/.ssh:ro

  compile:
    extends:
      service: build

  monitor:
    extends:
      file: docker/common.yaml
      service: ros_runtime_base
    image: ${MTT_IMAGE:-mtt_workspace:devel}
    build: *mtt_devel_build
    pull_policy: never
    command:
      - ros2
      - run
      - foxglove_bridge
      - foxglove_bridge
      - --ros-args
      - --params-file
      - ${WORKSPACE}/docker/foxglove_bridge.yaml
